<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Jadwal Sholat Jum'at - Ultra HD Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Belleza&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Belleza', sans-serif;
            background-color: #0b132b;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            gap: 25px;
        }

        .form-panel {
            background: #1c2541;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 1280px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid #3a506b;
        }

        .form-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 26px;
            color: #6fffe9;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 15px; color: #cbd5e1; font-weight: bold; }
        
        input {
            width: 100%; padding: 12px;
            background: #0b132b; border: 1px solid #3a506b; border-radius: 6px;
            color: #ffffff; font-family: 'Belleza', sans-serif; font-size: 16px;
        }
        input:focus { outline: none; border-color: #6fffe9; box-shadow: 0 0 8px rgba(111, 255, 233, 0.3); }

        .btn-download {
            width: 100%; max-width: 300px; margin: 0 auto; display: block;
            padding: 15px; background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white; border: none; border-radius: 6px;
            font-family: 'Belleza', sans-serif; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6); }

        .preview-panel {
            width: 100%; max-width: 1280px; background: #1c2541;
            padding: 20px; border-radius: 12px; border: 1px solid #3a506b;
        }
        .preview-panel h3 { margin-top: 0; margin-bottom: 15px; color: #6fffe9; font-size: 20px; text-align: center; }

        .canvas-outer-wrapper { width: 100%; overflow-x: auto; background: #0b132b; padding: 10px; border-radius: 8px; }
        .canvas-wrapper { width: 100%; position: relative; overflow: hidden; background: #000; margin: 0 auto; }

        /* Dimensi Asli Output (HD 1280x720) */
        #capture-area { position: absolute; width: 1280px; height: 720px; top: 0; left: 0; transform-origin: top left; }
        #bg-image { width: 1280px; height: 720px; position: absolute; top: 0; left: 0; z-index: 1; }

        /* PENGATURAN POSISI TEKS (TELAH DIPERBAIKI) */
        .text-overlay {
            position: absolute;
            font-family: 'Belleza', sans-serif;
            color: #ffffff;
            font-size: 38px;
            z-index: 2;
            white-space: nowrap;
        }

        /* Posisi Tanggal di Bawah Sholat Jum'at */
        #out-tanggal {
            top: 245px; 
            left: 50%;
            transform: translate(-50%, -50%); /* Kunci: Memusatkan tepat di tengah koordinat X dan Y */
            color: #f7d05c; 
            font-size: 30px;
        }

        /* Posisi Nama Petugas */
        .petugas-name {
            left: 470px; /* Posisi teks dimulai setelah label kuning */
            transform: translateY(-50%); /* Kunci Utama: Menarik teks agar pas di tengah kotak vertikal */
        }
        
        #out-imam { top: 326px; }
        #out-khatib { top: 399px; }
        #out-muadzin { top: 474px; }

        .info-note { text-align: center; font-size: 13px; color: #a5a5a5; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="form-panel">
        <h2>Input Data Petugas Jum'at</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Tanggal Pelaksanaan</label>
                <input type="text" id="in-tanggal" placeholder="Contoh: 3 Juli 2026">
            </div>
            <div class="form-group">
                <label>Nama IMAM</label>
                <input type="text" id="in-imam" placeholder="Masukkan nama Imam">
            </div>
            <div class="form-group">
                <label>Nama KHATIB</label>
                <input type="text" id="in-khatib" placeholder="Masukkan nama Khatib">
            </div>
            <div class="form-group">
                <label>Nama MUADZIN</label>
                <input type="text" id="in-muadzin" placeholder="Masukkan nama Muadzin">
            </div>
        </div>
        <button class="btn-download" onclick="downloadGambarHD()">Download Gambar (Ultra HD)</button>
        <div class="info-note">*Pastikan file <strong>petugas.jpg</strong> ada di folder yang sama.</div>
    </div>

    <div class="preview-panel">
        <h3>Live Preview</h3>
        <div class="canvas-outer-wrapper">
            <div class="canvas-wrapper" id="wrapper">
                <div id="capture-area">
                    <img src="petugas.jpg" id="bg-image" alt="Template Kosong">
                    
                    <div id="out-tanggal" class="text-overlay"></div>
                    <div id="out-imam" class="text-overlay petugas-name"></div>
                    <div id="out-khatib" class="text-overlay petugas-name"></div>
                    <div id="out-muadzin" class="text-overlay petugas-name"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sesuaikanUkuranPreview() {
            const wrapper = document.getElementById('wrapper');
            const captureArea = document.getElementById('capture-area');
            const lebarMaksimal = wrapper.parentElement.clientWidth - 20; 
            const hitungSkala = lebarMaksimal / 1280;
            
            captureArea.style.transform = `scale(${hitungSkala})`;
            wrapper.style.width = `${lebarMaksimal}px`;
            wrapper.style.height = `${720 * hitungSkala}px`;
        }
        window.addEventListener('resize', sesuaikanUkuranPreview);
        window.addEventListener('DOMContentLoaded', sesuaikanUkuranPreview);

        const fields = ['tanggal', 'imam', 'khatib', 'muadzin'];
        fields.forEach(id => {
            document.getElementById(`in-${id}`).addEventListener('input', function(e) {
                document.getElementById(`out-${id}`).innerText = e.target.value;
            });
        });

        function downloadGambarHD() {
            const areaCetak = document.getElementById('capture-area');
            const wrapper = document.getElementById('wrapper');
            
            const sisaTransform = areaCetak.style.transform;
            const sisaWrapperWidth = wrapper.style.width;
            const sisaWrapperHeight = wrapper.style.height;
            
            areaCetak.style.transform = 'none';
            wrapper.style.width = '1280px';
            wrapper.style.height = '720px';
            
            html2canvas(areaCetak, {
                scale: 3, 
                useCORS: true,
                logging: false,
                backgroundColor: null
            }).then(canvas => {
                areaCetak.style.transform = sisaTransform;
                wrapper.style.width = sisaWrapperWidth;
                wrapper.style.height = sisaWrapperHeight;
                
                const link = document.createElement('a');
                link.download = 'Jadwal_Petugas_Jumat.jpg';
                link.href = canvas.toDataURL('image/jpeg', 1.0);
                link.click();
            }).catch(err => {
                areaCetak.style.transform = sisaTransform;
                wrapper.style.width = sisaWrapperWidth;
                wrapper.style.height = sisaWrapperHeight;
                alert("Terjadi kesalahan sistem saat merender gambar HD.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
