<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Jadwal Sholat Jum'at - Ultra HD Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Belleza&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Belleza', sans-serif;
            background-color: #0b132b;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            gap: 25px;
        }

        /* Container Form Atas */
        .form-panel {
            background: #1c2541;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 1280px; /* Lebar disamakan dengan canvas agar seimbang */
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid #3a506b;
        }

        .form-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 26px;
            color: #6fffe9;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Grid Form agar input sejajar rapi di atas */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 15px;
            color: #cbd5e1;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0b132b;
            border: 1px solid #3a506b;
            border-radius: 6px;
            color: #ffffff;
            font-family: 'Belleza', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #6fffe9;
            box-shadow: 0 0 8px rgba(111, 255, 233, 0.3);
        }

        .btn-download {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            padding: 15px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Belleza', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6);
        }

        /* Container Preview Bawah (Dibuat Besar) */
        .preview-panel {
            width: 100%;
            max-width: 1280px;
            background: #1c2541;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a506b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .preview-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #6fffe9;
            font-size: 20px;
            text-align: center;
        }

        /* Area pembungkus agar canvas responsive tapi tidak merusak pixel */
        .canvas-outer-wrapper {
            width: 100%;
            overflow-x: auto; /* Scrollbar muncul jika layar terlalu kecil */
            background: #0b132b;
            padding: 10px;
            border-radius: 8px;
        }

        .canvas-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
            margin: 0 auto;
        }

        /* Lebar Asli Template Gambar (Resolusi HD 1280x720) */
        #capture-area {
            position: absolute;
            width: 1280px;
            height: 720px;
            top: 0;
            left: 0;
            transform-origin: top left;
        }

        #bg-image {
            width: 1280px;
            height: 720px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Penempatan Overlay Teks */
        .text-overlay {
            position: absolute;
            font-family: 'Belleza', sans-serif;
            color: #ffffff;
            font-size: 36px; /* Ukuran font diperbesar agar terlihat gagah dan jelas */
            left: 480px; /* Posisi pas setelah label kuning kotak template */
            z-index: 2;
            white-space: nowrap;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Sumbu Koordinat Y Box Biru */
        #out-tanggal {
            top: 215px;
            left: 50%;
            transform: translateX(-50%);
            color: #f7d05c; /* Warna Emas */
            font-size: 28px;
            text-align: center;
        }
        #out-imam { top: 323px; }
        #out-khatib { top: 406px; }
        #out-muadzin { top: 489px; }

        .info-note {
            text-align: center;
            font-size: 13px;
            color: #a5a5a5;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="form-panel">
        <h2>Input Data Petugas Jum'at</h2>
        
        <div class="form-grid">
            <div class="form-group">
                <label for="in-tanggal">Tanggal Pelaksanaan</label>
                <input type="text" id="in-tanggal" placeholder="Contoh: Jum'at, 6 Maret 2026">
            </div>

            <div class="form-group">
                <label for="in-imam">Nama IMAM</label>
                <input type="text" id="in-imam" placeholder="Masukkan nama Imam">
            </div>

            <div class="form-group">
                <label for="in-khatib">Nama KHATIB</label>
                <input type="text" id="in-khatib" placeholder="Masukkan nama Khatib">
            </div>

            <div class="form-group">
                <label for="in-muadzin">Nama MUADZIN</label>
                <input type="text" id="in-muadzin" placeholder="Masukkan nama Muadzin">
            </div>
        </div>

        <button class="btn-download" onclick="downloadGambarHD()">Download Gambar (Ultra HD)</button>
        <div class="info-note">*Pastikan file <strong>petugas.jpg</strong> berada di folder yang sama dengan file HTML ini.</div>
    </div>

    <div class="preview-panel">
        <h3>Live Preview (Tampilan Pratinjau Besar)</h3>
        <div class="canvas-outer-wrapper">
            <div class="canvas-wrapper" id="wrapper">
                <div id="capture-area">
                    <img src="petugas.jpg" id="bg-image" alt="Template Kosong">
                    
                    <div id="out-tanggal" class="text-overlay"></div>
                    <div id="out-imam" class="text-overlay"></div>
                    <div id="out-khatib" class="text-overlay"></div>
                    <div id="out-muadzin" class="text-overlay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Logika Pengatur Skala Otomatis agar Preview Mengikuti Lebar Monitor Maksimal
        function sesuaikanUkuranPreview() {
            const wrapper = document.getElementById('wrapper');
            const captureArea = document.getElementById('capture-area');
            const lebarMaksimal = wrapper.parentElement.clientWidth - 20; // Mengambil lebar area bungkus luar
            
            // Rasio kalkulasi berdasarkan lebar layar berbanding ketetapan resolusi gambar (1280px)
            const hitungSkala = lebarMaksimal / 1280;
            
            // Set css transform preview secara visual di browser
            captureArea.style.transform = `scale(${hitungSkala})`;
            wrapper.style.width = `${lebarMaksimal}px`;
            wrapper.style.height = `${720 * hitungSkala}px`;
        }

        window.addEventListener('resize', sesuaikanUkuranPreview);
        window.addEventListener('DOMContentLoaded', sesuaikanUkuranPreview);

        // 2. Logika Mengetik Langsung Muncul Secara Real-Time
        const fields = ['tanggal', 'imam', 'khatib', 'muadzin'];
        fields.forEach(id => {
            document.getElementById(`in-${id}`).addEventListener('input', function(e) {
                document.getElementById(`out-${id}`).innerText = e.target.value;
            });
        });

        // 3. Trik Kunci: Merestart Skala ke Posisi Normal Sebelum Mengambil Gambar Agar Hasil 100% Tajam / HD
        function downloadGambarHD() {
            const areaCetak = document.getElementById('capture-area');
            const wrapper = document.getElementById('wrapper');
            
            // Simpan ukuran scale responsif sementara waktu
            const sisaTransform = areaCetak.style.transform;
            const sisaWrapperWidth = wrapper.style.width;
            const sisaWrapperHeight = wrapper.style.height;
            
            // KUNCI: Paksa element kembali ke resolusi murni asli 100% tanpa kompresi CSS sebelum difoto
            areaCetak.style.transform = 'none';
            wrapper.style.width = '1280px';
            wrapper.style.height = '720px';
            
            // Panggil fungsi html2canvas dengan konfigurasi Ultra High Definition (Scale: 3)
            html2canvas(areaCetak, {
                scale: 3, // Meningkatkan kerapatan pixel 3x lipat, teks dijamin mulus & super tajam!
                useCORS: true,
                logging: false,
                backgroundColor: null
            }).then(canvas => {
                // Kembalikan layout pratinjau yang besar di monitor Anda seperti semula
                areaCetak.style.transform = sisaTransform;
                wrapper.style.width = sisaWrapperWidth;
                wrapper.style.height = sisaWrapperHeight;
                
                // Eksekusi Download Gambar Berformat JPEG/JPG Berkualitas 100% (1.0)
                const link = document.createElement('a');
                link.download = 'Jadwal_Petugas_Jumat_UltraHD.jpg';
                link.href = canvas.toDataURL('image/jpeg', 1.0);
                link.click();
            }).catch(err => {
                // Kembalikan jika error terjadi agar preview tidak rusak
                areaCetak.style.transform = sisaTransform;
                wrapper.style.width = sisaWrapperWidth;
                wrapper.style.height = sisaWrapperHeight;
                alert("Terjadi kesalahan sistem saat merender gambar HD.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
