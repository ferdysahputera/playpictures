<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadwal Sholat Digital - TV Mode for Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@700&display=swap');
        
        :root { --gold: #c5a059; --dark: #0f172a; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark); 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        .font-arabic { font-family: 'Amiri', serif; }
        .font-digital { font-family: 'JetBrains Mono', monospace; }

        /* Background TV Style */
        .bg-main { 
            background: radial-gradient(circle at top right, #1e3a8a, var(--dark)); 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Portrait Warning */
        @media screen and (orientation: portrait) {
            #portrait-warn { display: flex !important; }
        }

        .sholat-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            backdrop-filter: blur(8px);
            padding: 0.8vh 1.5vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 1vh;
            margin-bottom: 0.5vh;
        }

        .active-sholat { 
            background: linear-gradient(135deg, var(--gold), #e2c284) !important; 
            color: #000 !important; 
            transform: scale(1.03);
            border: 2px solid white !important;
        }

        /* Marquee */
        .marquee { white-space: nowrap; overflow: hidden; display: flex; align-items: center; flex: 1; }
        .marquee p { 
            display: inline-block; 
            animation: scroll 40s linear infinite; 
            font-size: 1.8vh;
        }

        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .info-box {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 2vh;
            padding: 2vh;
        }
        .info-box.active { display: flex; }
    </style>
</head>
<body class="bg-main">

    <div id="portrait-warn" class="fixed inset-0 bg-slate-900 z-[999] hidden flex-col items-center justify-center text-center p-10">
        <i class="fas fa-mobile-screen rotate-90 text-6xl text-[#c5a059] mb-4"></i>
        <h2 class="text-xl font-bold">Gunakan Mode Lanskap</h2>
        <p class="text-white/60 text-sm">Putar HP Anda untuk tampilan TV yang proporsional.</p>
    </div>

    <header class="flex justify-between items-center px-[4vw] py-[2vh] bg-black/60 border-b border-white/10 h-[15vh]">
        <div class="flex items-center gap-[2vw]">
            <i class="fas fa-mosque text-[5vh] text-[#c5a059]"></i>
            <div>
                <h1 id="masjid-name" class="text-[3.5vh] font-bold font-arabic text-[#c5a059]">Memuat...</h1>
                <p id="masjid-address" class="text-[1.2vh] text-white/40 uppercase tracking-widest italic">Menghubungkan...</p>
            </div>
        </div>
        <div class="flex gap-[3vw] items-center text-right">
            <div>
                <div id="date-masehi" class="text-[1.2vh] font-bold text-[#c5a059] uppercase tracking-widest">-</div>
                <div id="date-hijriah" class="text-[1.5vh] font-arabic text-white/70">-</div>
            </div>
            <div id="clock" class="text-[8vh] font-bold font-digital leading-none">00:00:00</div>
        </div>
    </header>

    <main class="flex flex-1 p-[2vh] gap-[2vh] overflow-hidden">
        <div class="w-[30%] flex flex-col justify-between">
            <div class="sholat-card" id="card-imsak"><span>Imsak</span><span class="font-digital text-[3vh]" id="time-imsak">--:--</span></div>
            <div class="sholat-card" id="card-subuh"><span>Subuh</span><span class="font-digital text-[3vh]" id="time-subuh">--:--</span></div>
            <div class="sholat-card" id="card-dzuhur"><span>Dzuhur</span><span class="font-digital text-[3vh]" id="time-dzuhur">--:--</span></div>
            <div class="sholat-card" id="card-ashar"><span>Ashar</span><span class="font-digital text-[3vh]" id="time-ashar">--:--</span></div>
            <div class="sholat-card" id="card-maghrib"><span>Maghrib</span><span class="font-digital text-[3vh]" id="time-maghrib">--:--</span></div>
            <div class="sholat-card" id="card-isya"><span>Isya</span><span class="font-digital text-[3vh]" id="time-isya">--:--</span></div>
        </div>

        <div class="w-[70%] flex flex-col gap-[2vh]">
            <div class="flex-1 relative rounded-[3vh] overflow-hidden border border-white/10 bg-black">
                <img src="https://images.unsplash.com/photo-1590076215667-873d17e78167?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover opacity-30">
                <div class="absolute bottom-0 left-0 p-[4vh] bg-gradient-to-t from-black w-full">
                    <h2 class="text-[3vh] font-bold italic" id="slide-caption">Jagalah Kebersihan Masjid</h2>
                </div>
            </div>
            <div class="h-[20vh] relative">
                <div id="panel-petugas" class="info-box active">
                    <div class="grid grid-cols-4 gap-2 text-center">
                        <div class="border-r border-white/10"><p class="text-[1vh] opacity-50 uppercase">Imam</p><p id="val-imam" class="text-[1.8vh] font-bold">-</p></div>
                        <div class="border-r border-white/10"><p class="text-[1vh] opacity-50 uppercase">Khatib</p><p id="val-khatib" class="text-[1.8vh] font-bold">-</p></div>
                        <div class="border-r border-white/10"><p class="text-[1vh] opacity-50 uppercase">Muadzin</p><p id="val-muadzin" class="text-[1.8vh] font-bold">-</p></div>
                        <div><p class="text-[1vh] opacity-50 uppercase">Bilal</p><p id="val-bilal" class="text-[1.8vh] font-bold">-</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-[10vh] bg-black/80 border-t border-[#c5a059]/30 flex items-center">
        <div class="bg-[#c5a059] h-full px-[3vw] flex flex-col justify-center text-slate-900 font-black min-w-[20vw]">
            <span class="text-[1vh] uppercase" id="label-next">Menuju</span>
            <div id="countdown" class="text-[4vh] font-digital leading-none">00:00:00</div>
        </div>
        <div class="marquee"><p id="running-text">Mencari data...</p></div>
    </footer>

    <script>
        // Gunakan script yang sama dengan sebelumnya, logika tetap sama.
        // Fokus hanya pada visualisasi CSS vw/vh agar tetap "rasa TV".
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRaRN0PmPNfCc9oI8ECrSVTkcEPf6LPj1ReB_esf0Ob6peD-R8GaQojCfeUuMUrQRsMq0mpyjfB_4Yn/pub?gid=324382063&single=true&output=csv";
        let appData = {}, prayerSchedule = [];

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                text.split('\n').forEach(row => {
                    const cols = row.split(',');
                    if(cols.length>=2) appData[cols[0].trim().toLowerCase().replace(/ /g,'_')] = cols[1].trim();
                });
                render();
                fetchAPI();
            } catch(e) {}
            setInterval(updateTime, 1000);
        }

        function render() {
            document.getElementById('masjid-name').innerText = appData.nama_masjid || "Masjid Digital";
            document.getElementById('val-imam').innerText = appData.jumat_imam || "-";
            document.getElementById('running-text').innerText = appData.running_text || "Selamat Datang";
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('date-masehi').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
        }

        async function fetchAPI() {
            const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/0702/${new Date().getFullYear()}/${new Date().getMonth()+1}/${new Date().getDate()}`);
            const json = await res.json();
            const j = json.data.jadwal;
            const times = ['imsak','subuh','dzuhur','ashar','maghrib','isya'];
            times.forEach(t => document.getElementById('time-'+t).innerText = j[t]);
        }

        window.onload = init;
    </script>
</body>
</html>
