<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajadah Pintar - Kamera Sensor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            z-index: 10;
        }

        select, button {
            background-color: #1c2541;
            color: white;
            border: 2px solid #4a4e69;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .display-container {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .rakaat-title {
            font-size: 1.5rem;
            color: #6fffe9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .rakaat-number {
            font-size: 10rem;
            font-weight: bold;
            line-height: 1;
        }

        .status-info {
            font-size: 1.2rem;
            color: #a5a5a5;
            margin-top: 10px;
            padding: 0 20px;
        }

        /* Menyembunyikan elemen video kamera asli agar tidak mengganggu */
        #videoContainer {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 80px;
            height: 60px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #3a506b;
            opacity: 0.6;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .control-panel {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .btn-danger { background-color: #e63946; border: none; }
        .btn-success { background-color: #38b000; border: none; }
    </style>
</head>
<body>

    <div id="videoContainer">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvasProcessor"></canvas>
    </div>

    <div class="header">
        <h2>Sajadah Sensor Cahaya</h2>
        <select id="sholatSelect" onchange="resetApp()">
            <option value="2">Subuh (2 Rakaat)</option>
            <option value="4" selected>Dzuhur (4 Rakaat)</option>
            <option value="4">Ashar (4 Rakaat)</option>
            <option value="3">Maghrib (3 Rakaat)</option>
            <option value="4">Isya (4 Rakaat)</option>
        </select>
    </div>

    <div class="display-container">
        <div class="rakaat-title">Rakaat</div>
        <div class="rakaat-number" id="rakaatDisplay">1</div>
        <div class="status-info" id="statusDisplay">Izinkan kamera terlebih dahulu...</div>
    </div>

    <div class="control-panel">
        <button id="startCamBtn" class="btn-success" onclick="initCamera()">Aktifkan Kamera</button>
        <button class="btn-danger" onclick="resetApp()">Reset</button>
    </div>

    <script>
        let totalSujud = 0;
        let currentRakaat = 1;
        let isCalibrated = false;
        let baseBrightness = 0;
        let isSujudActive = false;
        let detectionInterval;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvasProcessor');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 1. Fungsi Minta Izin Kamera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // Memprioritaskan kamera depan HP
                    audio: false 
                });
                video.srcObject = stream;
                document.getElementById('statusDisplay').innerText = "Kamera aktif. Menghitung kalibrasi cahaya...";
                document.getElementById('startCamBtn').style.display = 'none';
                
                // Mulai memproses gambar kamera setelah video berjalan
                video.onloadedmetadata = () => {
                    canvas.width = 64; // Resolusi kecil agar performa HP ringan
                    canvas.height = 48;
                    setTimeout(calibrateLight, 2000); // Tunggu 2 detik untuk stabilisasi cahaya ruangan
                };
            } catch (err) {
                alert("Gagal mengakses kamera. Pastikan memberikan izin kamera di browser Anda.");
                document.getElementById('statusDisplay').innerText = "Akses kamera ditolak.";
            }
        }

        // 2. Sistem Kalibrasi Cahaya Ruangan otomatis
        function calibrateLight() {
            baseBrightness = getAverageBrightness();
            isCalibrated = true;
            document.getElementById('statusDisplay').innerText = "Kalibrasi selesai. Silakan mulai Sholat.";
            
            // Loop pendeteksian sensor setiap 200ms (5 kali per detik)
            detectionInterval = setInterval(detectSujud, 200);
        }

        // Fungsi menghitung kegelapan/kecerahan layar
        function getAverageBrightness() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let r, g, b, avg;
            let colorSum = 0;

            for(let x = 0, len = data.length; x < len; x += 4) {
                r = data[x];
                g = data[x+1];
                b = data[x+2];
                avg = Math.floor((r+g+b)/3);
                colorSum += avg;
            }
            return colorSum / (canvas.width * canvas.height);
        }

        // 3. Logika Deteksi Gerakan Sujud & Validasi Rakaat
        function detectSujud() {
            if (!isCalibrated) return;

            let currentBrightness = getAverageBrightness();
            let targetRakaat = parseInt(document.getElementById('sholatSelect').value);

            // Jika cahaya drop > 40% dari cahaya normal, dianggap dahi menutupi kamera (Sujud)
            if (currentBrightness < baseBrightness * 0.60 && !isSujudActive) {
                isSujudActive = true; // Kunci biar tidak terhitung berkali-kali dalam 1 sujud

                // CEK KESALAHAN: Jika rakaat sudah melebihi target tapi masih sujud lagi
                if (currentRakaat >= targetRakaat && totalSujud >= (targetRakaat * 2)) {
                    playErrorSound(); // Bunyi alarm salah rakaat!
                    document.getElementById('statusDisplay').innerText = "⚠️ PERINGATAN: Rakaat Berlebih!";
                    document.getElementById('statusDisplay').style.color = "#e63946";
                    return;
                }

                totalSujud++;
                let sujudKe = totalSujud % 2 === 0 ? 2 : 1;
                playBeep(440, 0.1); // Bunyi bip pendek tanda sujud terdeteksi aman

                document.getElementById('statusDisplay').innerText = `Sujud ke-${sujudKe} terdeteksi`;

                // Jika sudah sujud ke-2, rakaat bertambah
                if (totalSujud > 0 && totalSujud % 2 === 0) {
                    if (currentRakaat < targetRakaat) {
                        currentRakaat++;
                        document.getElementById('rakaatDisplay').innerText = currentRakaat;
                    } else {
                        document.getElementById('statusDisplay').innerText = "Rakaat Terakhir Selesai. Silakan Tahiyat Akhir.";
                    }
                }
            } 
            // Jika cahaya kembali normal, artinya user bangun dari sujud
            else if (currentBrightness >= baseBrightness * 0.75 && isSujudActive) {
                isSujudActive = false; // Buka kunci sensor untuk sujud berikutnya
            }
        }

        // 4. Audio Generator (Tanpa File MP3)
        // Bunyi penanda sukses (Bip pendek)
        function playBeep(frequency, duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // Bunyi Peringatan Salah Rakaat (Alarm panjang nada tinggi)
        function playErrorSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Loop bunyi alarm sebanyak 3 kali kilat
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth'; // Suara agak tajam/nyaring agar sadar
                    osc.frequency.value = 880; // Nada tinggi
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                }, i * 500);
            }
        }

        function resetApp() {
            totalSujud = 0;
            currentRakaat = 1;
            isSujudActive = false;
            document.getElementById('rakaatDisplay').innerText = "1";
            document.getElementById('statusDisplay').innerText = isCalibrated ? "Silakan mulai Sholat." : "Izinkan kamera...";
            document.getElementById('statusDisplay').style.color = "#a5a5a5";
        }
    </script>
</body>
</html>
