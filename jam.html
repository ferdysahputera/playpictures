
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ittaqo Digital - Mobile Landscape</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root { 
        --gold: #D4AF37; --white: #ffffff; --text-dark: #1d1d1f;
        --fajr: #3498db; --dhuhr: #f1c40f; --asr: #e67e22; --maghrib: #e74c3c; --isha: #9b59b6;
    }
    
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; color: var(--text-dark); overflow: hidden; height: 100vh; width: 100vw; }

    /* Container Utama */
    .container { display: flex; height: calc(100vh - 40px); padding: 10px; gap: 10px; box-sizing: border-box; }

    /* Panel Kiri (Jadwal) */
    .left { width: 38%; display: flex; flex-direction: column; gap: 8px; height: 100%; }
    
    .card-top { 
        background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 10px; 
        text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    }
    .clock { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--text-dark); line-height: 1; }
    .date-info { font-size: 0.65rem; color: var(--gold); font-weight: 600; margin-top: 4px; }

    .jadwal-list { display: grid; grid-template-rows: repeat(5, 1fr); gap: 6px; flex-grow: 1; }
    .jadwal-item { 
        display: flex; align-items: center; padding: 0 12px; 
        background: rgba(255, 255, 255, 0.9); border-radius: 12px; 
        border-left: 5px solid #ddd; transition: 0.3s;
    }
    
    /* Identitas Warna */
    #row-Fajr { border-left-color: var(--fajr); }
    #row-Dhuhr { border-left-color: var(--dhuhr); }
    #row-Asr { border-left-color: var(--asr); }
    #row-Maghrib { border-left-color: var(--maghrib); }
    #row-Isha { border-left-color: var(--isha); }

    /* Aktif/Sorot */
    .jadwal-item.active { transform: scale(1.02); color: white !important; }
    #row-Fajr.active { background: var(--fajr); }
    #row-Dhuhr.active { background: var(--dhuhr); }
    #row-Asr.active { background: var(--asr); }
    #row-Maghrib.active { background: var(--maghrib); }
    #row-Isha.active { background: var(--isha); }
    .jadwal-item.active * { color: white !important; }

    .icon-box { width: 25px; font-size: 1rem; margin-right: 8px; text-align: center; color: #555; }
    .text-group { display: flex; flex-direction: column; }
    .label-sholat { font-size: 0.55rem; text-transform: uppercase; font-weight: 700; opacity: 0.6; }
    .waktu-sholat { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 600; }

    /* Panel Kanan (Slide & Info) */
    .right { flex: 1; position: relative; border-radius: 20px; overflow: hidden; background: #222; }
    .slide-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 2s; }
    .slide-img.active { opacity: 0.6; }

    .masjid-header { position: absolute; top: 15px; left: 20px; z-index: 10; color: white; }
    .masjid-header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 0; letter-spacing: 1px; }
    
    .lower-third {
        position: absolute; bottom: 15px; left: 15px; right: 15px;
        background: rgba(255, 255, 255, 0.95); padding: 10px 15px; border-radius: 12px; 
        border-left: 5px solid var(--gold); transform: translateY(200%); transition: 0.6s; z-index: 50;
    }
    .lower-third.show { transform: translateY(0); }

    /* Overlay Fullscreen Mobile */
    #fullOverlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center;
        background: var(--white); text-align: center;
    }
    .ov-timer { font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 700; color: var(--text-dark); }

    /* Footer */
    .footer { height: 40px; background: var(--white); display: flex; align-items: center; overflow: hidden; border-top: 1px solid #eee; }
    .marquee { font-size: 0.9rem; font-weight: 400; white-space: nowrap; animation: marquee 20s linear infinite; }
    @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

    /* Khusus Lanskap HP Kecil */
    @media (max-height: 400px) {
        .clock { font-size: 1.8rem; }
        .waktu-sholat { font-size: 1rem; }
        .container { padding: 5px; gap: 8px; }
        .card-top { padding: 5px; }
    }
</style>
</head>
<body onclick="startAudio()">

<div id="mainUI" class="container">
    <div class="left">
        <div class="card-top">
            <div class="clock" id="clock">00:00</div>
            <div id="hijriDate" class="date-info">-- -- ----</div>
        </div>

        <div class="jadwal-list">
            <div class="jadwal-item" id="row-Fajr"><div class="icon-box"><i class="fa-solid fa-cloud-sun"></i></div><div class="text-group"><span class="label-sholat">Subuh</span><span class="waktu-sholat" id="subuh">--:--</span></div></div>
            <div class="jadwal-item" id="row-Dhuhr"><div class="icon-box"><i class="fa-solid fa-sun"></i></div><div class="text-group"><span class="label-sholat">Dzuhur</span><span class="waktu-sholat" id="dzuhur">--:--</span></div></div>
            <div class="jadwal-item" id="row-Asr"><div class="icon-box"><i class="fa-solid fa-cloud-sun-rain"></i></div><div class="text-group"><span class="label-sholat">Ashar</span><span class="waktu-sholat" id="ashar">--:--</span></div></div>
            <div class="jadwal-item" id="row-Maghrib"><div class="icon-box"><i class="fa-solid fa-moon"></i></div><div class="text-group"><span class="label-sholat">Maghrib</span><span class="waktu-sholat" id="maghrib">--:--</span></div></div>
            <div class="jadwal-item" id="row-Isha"><div class="icon-box"><i class="fa-solid fa-star-and-crescent"></i></div><div class="text-group"><span class="label-sholat">Isya</span><span class="waktu-sholat" id="isya">--:--</span></div></div>
        </div>

        <div class="card-top" style="border: 1.5px solid var(--gold); padding: 5px;">
            <div id="countdown" style="font-family: 'Orbitron'; font-size: 1.2rem; color: var(--gold); font-weight: 700;">00:00:00</div>
        </div>
    </div>

    <div class="right">
        <div class="masjid-header">
            <h1 style="font-size: 1.2rem;">Masjid Raya Ittaqo</h1>
            <p style="font-size: 0.6rem; opacity: 0.7; margin: 0;">Pekanbaru, Riau</p>
        </div>
        <img src="https://images.unsplash.com/photo-1590076215667-873d3289816c?q=80&w=1000" class="slide-img active">
        <img src="https://images.unsplash.com/photo-1542623024-a797bb77bbbc?q=80&w=1000" class="slide-img">
        
        <div class="lower-third" id="lowerThird">
            <div style="color: var(--gold); font-weight: 800; font-size: 0.55rem;" id="ltLabel">INFO</div>
            <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);" id="ltTitle">...</div>
        </div>
    </div>
</div>

<div id="fullOverlay">
    <div style="font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold);" id="ovTitle">IQOMAH</div>
    <div class="ov-timer" id="ovTimer">00:00</div>
    <div style="font-size: 1rem; opacity: 0.6;" id="ovMsg">Luruskan Barisan</div>
</div>

<div class="footer"><div class="marquee">Ketuk layar untuk suara... Luruskan shaf... Matikan ponsel...</div></div>

<audio id="murottalAudio"></audio>

<script>
    let prayerTimes = {};
    let audioCtx = null;
    let infoIdx = 0;
    const infoData = [{c:"JUMAT", t:"Khatib: Ust. Dr. Abdullah"}, {c:"KAS", t:"Saldo: Rp 18.450.000"}, {c:"INFO", t:"Kajian Selasa Ba'da Maghrib"}];

    function startAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playBeep(f = 1000) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.value = 0.1;
        o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    async function getPrayer() {
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Pekanbaru&country=Indonesia&method=11');
            const d = await res.json();
            prayerTimes = d.data.timings;
            document.getElementById('hijriDate').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.en} ${d.data.date.hijri.year} H`;
            const map = {Fajr:'subuh', Dhuhr:'dzuhur', Asr:'ashar', Maghrib:'maghrib', Isha:'isya'};
            Object.keys(map).forEach(k => document.getElementById(map[k]).innerText = prayerTimes[k]);
        } catch(e) { console.log("API Error"); }
    }

    function update() {
        const now = new Date();
        const curM = now.getHours() * 60 + now.getMinutes();
        const curS = now.getSeconds();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', hour12:false});
        
        if(!prayerTimes.Fajr) return;
        const list = [{id:'Fajr', t:prayerTimes.Fajr}, {id:'Dhuhr', t:prayerTimes.Dhuhr}, {id:'Asr', t:prayerTimes.Asr}, {id:'Maghrib', t:prayerTimes.Maghrib}, {id:'Isha', t:prayerTimes.Isha}];
        
        let found = false;
        list.forEach(p => {
            const [h, m] = p.t.split(':');
            const targetM = parseInt(h) * 60 + parseInt(m);
            const diff = targetM - curM;

            // Murottal 15-3 Menit
            if(diff <= 15 && diff > 3) {
                const a = document.getElementById('murottalAudio');
                if(a.paused) { a.src = "https://download.quranicaudio.com/quran/mishari_rashid_al_afasy/055.mp3"; a.play(); }
            } else if(diff <= 3) { document.getElementById('murottalAudio').pause(); }

            // Highlight
            if(diff > 0 && !found) {
                document.getElementById('row-'+p.id).classList.add('active');
                let sRem = (diff * 60) - curS;
                document.getElementById('countdown').innerText = `${Math.floor(sRem/3600).toString().padStart(2,'0')}:${Math.floor((sRem%3600)/60).toString().padStart(2,'0')}:${(sRem%60).toString().padStart(2,'0')}`;
                found = true;
            } else document.getElementById('row-'+p.id).classList.remove('active');

            if(diff === 0 && curS === 0) playBeep(1200);

            // Overlay Responsive
            if(diff === 1) showOV("ADZAN", 60 - curS, "Persiapan...");
            else if(diff === 0) showOV("WAKTU ADZAN", 120 - curS, "Dengarkan Adzan");
            else if(diff <= -1 && diff >= -15) {
                let iq = (5 * 60) - ((Math.abs(diff)-1) * 60 + curS);
                if(iq > 0) showOV("IQOMAH", iq, "Luruskan Shaf");
                else if(Math.abs(diff) <= 15) showOV("SHOLAT", 0, "Matikan HP");
                else hideOV();
            } else if(!found && diff > 1) hideOV();
        });
    }

    function showOV(t, s, m) {
        document.getElementById('fullOverlay').style.display = 'flex';
        document.getElementById('ovTitle').innerText = t;
        document.getElementById('ovMsg').innerText = m;
        if(s > 0) document.getElementById('ovTimer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        else document.getElementById('ovTimer').innerText = "IBADAH";
    }

    function hideOV() { document.getElementById('fullOverlay').style.display = 'none'; }

    setInterval(() => {
        const lt = document.getElementById('lowerThird');
        lt.classList.remove('show');
        setTimeout(() => {
            document.getElementById('ltLabel').innerText = infoData[infoIdx].c;
            document.getElementById('ltTitle').innerText = infoData[infoIdx].t;
            lt.classList.add('show');
            infoIdx = (infoIdx + 1) % infoData.length;
        }, 800);
    }, 12000);

    setInterval(() => {
        const imgs = document.querySelectorAll('.slide-img');
        const active = document.querySelector('.slide-img.active');
        active.classList.remove('active');
        (active.nextElementSibling || imgs[0]).classList.add('active');
    }, 10000);

    setInterval(update, 1000);
    getPrayer();
</script>
</body>
</html>
