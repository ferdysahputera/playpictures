<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Tonton video terbaru dari Play Pictures. Lihat deskripsi, rekomendasi, dan share ke semua sosial media.">
  <meta property="og:title" content="Play Pictures - Video">
  <meta property="og:description" content="Tonton video terbaru dari Play Pictures.">
  <meta property="og:type" content="video.other">
  <meta property="og:url" content="">
  <meta name="twitter:card" content="player">
  <title>Detail Video - Play Pictures</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .video-page {
      display: flex;
      flex-direction: row;
      gap: 2rem;
      padding: 2rem;
      flex-wrap: wrap;
      width: 100%;
      max-width: 100%;
    }

    .left-column {
      flex: 2;
      min-width: 0;
      max-width: 100%;
    }

    .right-column {
      flex: 1;
      min-width: 0;
      max-width: 100%;
    }

    .video-frame-container {
      border: 1px solid rgba(255, 106, 0, 0.3);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 106, 0, 0.15);
      position: relative;
      width: 100%;
      max-width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: rgba(42, 42, 42, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .video-info {
      margin-top: 1rem;
      padding: 1.5rem;
      background: rgba(42, 42, 42, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }

    .video-stats {
      color: var(--accent);
      font-size: 0.9rem;
      margin: 0.5rem 0;
    }

    .video-description {
      white-space: pre-line;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(42, 42, 42, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .video-description summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: bold;
      padding: 0.75rem 1rem;
      background: var(--card-bg);
      transition: background 0.3s;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .video-description summary::before {
      content: '\f107';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      transition: transform 0.3s;
    }

    .video-description[open] summary::before {
      transform: rotate(180deg);
    }

    .video-description summary:hover {
      background: var(--hover);
    }

    .video-description .desc-content {
      padding: 1rem;
      border-top: 1px solid var(--card-bg);
    }

    .video-description a {
      color: var(--accent);
      text-decoration: underline;
    }

    .share-buttons {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .share-buttons button {
      background: rgba(42, 42, 42, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      border: 1px solid var(--glass-border);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .share-buttons button:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 106, 0, 0.4);
    }

    .related-videos h3 {
      margin-bottom: 1rem;
    }

    .video-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .video-grid .card {
      display: flex;
      gap: 1rem;
      background: rgba(42, 42, 42, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0.5rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .video-grid .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(255, 106, 0, 0.15);
    }

    .video-grid .thumb {
      width: 100px;
      height: 70px;
      object-fit: cover;
      border-radius: 5px;
    }

    .video-grid .card-content {
      flex: 1;
    }

    /* Fullscreen video support */
    :fullscreen iframe,
    :-webkit-full-screen iframe {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover;
    }

    @media (max-width: 768px) {
      .video-page {
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
      }

      .left-column,
      .right-column {
        flex: 1 1 auto;
      }

      .video-frame-container {
        border-width: 2px;
      }

      .video-grid .card {
        flex-direction: column;
        gap: 0.5rem;
      }

      .video-grid .thumb {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }
    }
  </style>
</head>
<body class="fade-in">
  <header>
    <div class="logo"><a href="index.html"><img src="logo.png"/></a></div>

    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">Tentang</a></li>
      </ul>
    </nav>
  </header>

  <!-- Floating Search -->
  <button id="floating-search" aria-label="Search"><i class="fas fa-search"></i></button>
  <div id="search-overlay">
    <div class="overlay-content">
      <button id="overlay-close" aria-label="Tutup">?</button>
      <form id="overlay-search-form">
        <input type="text" id="overlay-search-input" placeholder="Cari video...">
        <button type="submit"><i class="fas fa-search"></i></button>
      </form>
    </div>
  </div>

  <main class="video-page">
    <!-- KIRI -->
    <div class="left-column">
      <div class="video-frame-container">
        <iframe id="video-frame" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="video-info">
        <h2 id="video-title">Memuat judul...</h2>
        <div id="video-stats" class="video-stats"></div>
        <details id="video-description" class="video-description">
          <summary>Deskripsi</summary>
          <div class="desc-content">Memuat deskripsi...</div>
        </details>

        <div class="share-buttons">
          <button id="copy-link" aria-label="Salin Link"><i class="fas fa-link"></i></button>
          <button id="share-whatsapp" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></button>
          <button id="share-facebook" aria-label="Facebook"><i class="fab fa-facebook"></i></button>
          <button id="share-twitter" aria-label="Twitter"><i class="fab fa-twitter"></i></button>
          <button id="share-telegram" aria-label="Telegram"><i class="fab fa-telegram"></i></button>
          <button id="share-threads" aria-label="Threads"><i class="fab fa-threads"></i></button>
          <button id="download-btn" aria-label="Download"><i class="fas fa-download"></i></button>
        </div>
      </div>
    </div>

    <!-- KANAN -->
    <div class="right-column related-videos">
      <h3>Video Rekomendasi</h3>
      <div id="related-list" class="video-grid"></div>
      <h3 style="margin-top:2rem;">Video Terbaru</h3>
      <div id="recent-list" class="video-grid"></div>
      <div id="recent-error" class="error-message hidden" style="margin-top:1rem;"></div>
    </div>
  </main>

  <script>
    const videoId = new URLSearchParams(window.location.search).get("v");
    const API_KEY = "AIzaSyDq4QPxumyDdxZB6ZlUciD7dsSA5ftQsQk";
    const CHANNEL_ID = "UC87Oi8WXRAI2ncAX7CoBT6w";
    const MAX_RESULTS = 6;

    const iframe = document.getElementById("video-frame");
    const titleEl = document.getElementById("video-title");
    const descDetails = document.getElementById("video-description");
    const descContent = descDetails.querySelector(".desc-content");
    const relatedList = document.getElementById("related-list");
    const recentList = document.getElementById("recent-list");
    const recentError = document.getElementById("recent-error");

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatStats(stats) {
      if (!stats) return '';
      const views = stats.viewCount ? parseInt(stats.viewCount).toLocaleString('id-ID') : '0';
      const likes = stats.likeCount ? parseInt(stats.likeCount).toLocaleString('id-ID') : '0';
      return ` • ${views} views • ${likes} likes`;
    }

    if (videoId) {
      iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&autoplay=1`;

      fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
          const snippet = data.items[0].snippet;
          const stats = data.items[0].statistics;
          titleEl.textContent = snippet.title.split("|").map(t => t.trim()).filter(t => t)[0] || snippet.title;
          document.getElementById("video-stats").textContent = formatStats(stats);
          descContent.innerHTML = linkify(snippet.description);

          document.title = titleEl.textContent + " - Play Pictures";
          const ogTitle = document.querySelector('meta[property="og:title"]');
          const ogDesc = document.querySelector('meta[property="og:description"]');
          const metaDesc = document.querySelector('meta[name="description"]');
          if (ogTitle) ogTitle.setAttribute("content", titleEl.textContent);
          if (ogDesc) ogDesc.setAttribute("content", snippet.description.slice(0, 200));
          if (metaDesc) metaDesc.setAttribute("content", snippet.description.slice(0, 200));

          const ids = extractVideoIdsFromDescription(snippet.description);
          if (ids.length > 0) {
            document.querySelector(".related-videos h3").textContent = snippet.title;
            fetchRecommended(ids);
          } else {
            document.querySelector(".related-videos h3").textContent = "Rekomendasi Lainnya";
            fetchChannelRecommendations();
          }
          const tags = snippet.title.split("|").map(t => t.trim()).filter(t => t);
          const tagsEl = document.createElement("div");
          tagsEl.className = "tags";
          tags.forEach(tag => {
            const span = document.createElement("span");
            span.className = "tag";
            span.textContent = tag;
            span.style.cursor = "pointer";
            span.addEventListener("click", () => {
              window.location.href = `index.html?q=${encodeURIComponent(tag)}`;
            });
            tagsEl.appendChild(span);
          });
          titleEl.insertAdjacentElement("afterend", tagsEl);
          fetchRecentVideos();
        });

      // Optional fullscreen trigger for mobile
      iframe.addEventListener("load", () => {
        if (window.innerWidth < 768 && iframe.requestFullscreen) {
          const isPortrait = window.matchMedia("(orientation: portrait)").matches;
          if (isPortrait) {
            iframe.requestFullscreen().then(() => {
              if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
              }
            }).catch(() => {});
          }
        }
      });
    }

    function linkify(text) {
      const urlPattern = /(\bhttps?:\/\/[^\s]+)/gi;
      return text.replace(urlPattern, function (url) {
        const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
        if (ytMatch) {
          const id = ytMatch[1];
          return `<a href="video.html?v=${id}">${url}</a>`;
        } else {
          return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        }
      });
    }

    function extractVideoIdsFromDescription(desc) {
      const matches = desc.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/g) || [];
      const ids = matches.map(link => {
        const match = link.match(/(?:v=|\.be\/)([\w-]{11})/);
        return match ? match[1] : null;
      }).filter(Boolean);
      return [...new Set(ids)].slice(0, MAX_RESULTS);
    }

      function fetchRecommended(ids) {
       if (!ids.length) return;
       fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids.join(',')}&key=${API_KEY}`)
         .then(res => res.json())
         .then(data => {
           data.items.forEach((item, index) => {
             const snippet = item.snippet;
             const stats = item.statistics;
             const vidId = item.id;
             const label = `BAGIAN ${index + 1}`;
             const isActive = vidId === videoId;
             const card = document.createElement("a");
             card.href = `video.html?v=${vidId}`;
             card.className = `card desc-card${isActive ? ' active-video' : ''}`;
             card.innerHTML = `
               <div class="thumb-wrapper">
                 <img class="thumb" src="${snippet.thumbnails.medium.url}" alt="Thumb ${snippet.title}">
                 <span class="rec-label">${label}</span>
               </div>
               <div class="card-content">
                 <div class="title">${snippet.title}</div>
                 <div class="meta">
                   <span class="published">${formatDate(snippet.publishedAt)}${formatStats(stats)}</span>
                   ${isActive ? '<span class="active-badge"><i class="fas fa-play"></i> SEDANG DITONTON</span>' : ''}
                 </div>
               </div>
             `;
             relatedList.appendChild(card);
           });
         });
     }

     function fetchChannelRecommendations() {
      fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=5&order=date&type=video&key=${API_KEY}`)
        .then(res => {
          if (!res.ok) throw new Error("HTTP error " + res.status);
          return res.json();
        })
        .then(data => {
          const ids = (data.items || []).map(item => item.id).filter(id => id && id !== videoId);
          if (!ids.length) return;
          return fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids.join(',')}&key=${API_KEY}`)
            .then(res => {
              if (!res.ok) throw new Error("HTTP error " + res.status);
              return res.json();
            })
            .then(vidData => {
              (vidData.items || []).forEach(item => {
                const snippet = item.snippet;
                const stats = item.statistics;
                const vidId = item.id;
                const card = document.createElement("a");
                card.href = `video.html?v=${vidId}`;
                card.className = "card";
                card.innerHTML = `
                  <div class="thumb-wrapper">
                    <img class="thumb" src="${snippet.thumbnails.medium.url}" alt="Thumbnail ${snippet.title}">
                  </div>
                  <div class="card-content">
                    <div class="title">${snippet.title}</div>
                    <div class="published">${formatDate(snippet.publishedAt)}${formatStats(stats)}</div>
                  </div>
                `;
                relatedList.appendChild(card);
              });
            });
        })
        .catch(err => console.error("Gagal memuat rekomendasi channel:", err));
    }

    function fetchRecentVideos() {
      fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=5&order=date&type=video&key=${API_KEY}`)
        .then(res => {
          if (!res.ok) throw new Error("HTTP error " + res.status);
          return res.json();
        })
        .then(data => {
          const items = data.items || [];
          const ids = items.map(item => item.id).filter(id => id && id !== videoId);
          if (!ids.length) return;
          return fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${ids.join(',')}&key=${API_KEY}`)
            .then(res => {
              if (!res.ok) throw new Error("HTTP error " + res.status);
              return res.json();
            })
            .then(vidData => {
              (vidData.items || []).forEach(item => {
                const snippet = item.snippet;
                const stats = item.statistics;
                const vidId = item.id;
                const card = document.createElement("a");
                card.href = `video.html?v=${vidId}`;
                card.className = "card";
                card.innerHTML = `
                  <div class="thumb-wrapper">
                    <img class="thumb" src="${snippet.thumbnails.medium.url}" alt="Thumbnail ${snippet.title}">
                  </div>
                  <div class="card-content">
                    <div class="title">${snippet.title}</div>
                    <div class="published">${formatDate(snippet.publishedAt)}${formatStats(stats)}</div>
                  </div>
                `;
                recentList.appendChild(card);
              });
            });
        })
        .catch(err => {
          console.error("Gagal memuat video terbaru:", err);
          recentError.textContent = "Gagal memuat video terbaru.";
          recentError.classList.remove("hidden");
        });
    }

    // Share + Copy + Download
    const copyBtn = document.getElementById("copy-link");
    const waBtn = document.getElementById("share-whatsapp");
    const fbBtn = document.getElementById("share-facebook");
    const twBtn = document.getElementById("share-twitter");
    const tgBtn = document.getElementById("share-telegram");
    const thBtn = document.getElementById("share-threads");
    const dlBtn = document.getElementById("download-btn");

    copyBtn.addEventListener("click", () => {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        copyBtn.textContent = "? Tersalin!";
        setTimeout(() => {
          copyBtn.innerHTML = '<i class="fas fa-link"></i> Salin Link';
        }, 2000);
      });
    });

    waBtn.addEventListener("click", () => {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://wa.me/?text=${url}`, "_blank");
    });

    fbBtn.addEventListener("click", () => {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, "_blank");
    });

    twBtn.addEventListener("click", () => {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://twitter.com/intent/tweet?url=${url}`, "_blank");
    });

    tgBtn.addEventListener("click", () => {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://t.me/share/url?url=${url}`, "_blank");
    });

    thBtn.addEventListener("click", () => {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.threads.net/intent/post?text=${url}`, "_blank");
    });

    dlBtn.addEventListener("click", openModal);

    // Hamburger
    const menuToggle = document.querySelector(".menu-toggle");
    const nav = document.querySelector("nav");
    menuToggle.addEventListener("click", () => {
      const expanded = menuToggle.getAttribute("aria-expanded") === "true";
      menuToggle.setAttribute("aria-expanded", !expanded);
      menuToggle.classList.toggle("active");
      nav.classList.toggle("open");
    });
    document.addEventListener("click", (e) => {
      if (!nav.contains(e.target) && !menuToggle.contains(e.target)) {
        nav.classList.remove("open");
        menuToggle.classList.remove("active");
        menuToggle.setAttribute("aria-expanded", "false");
      }
    });

    // Floating Search
    const floatingSearchBtn = document.getElementById("floating-search");
    const searchOverlay = document.getElementById("search-overlay");
    const overlaySearchForm = document.getElementById("overlay-search-form");
    const overlaySearchInput = document.getElementById("overlay-search-input");
    const overlayClose = document.getElementById("overlay-close");

    floatingSearchBtn.addEventListener("click", () => {
      searchOverlay.classList.add("active");
      overlaySearchInput.focus();
    });

    overlayClose.addEventListener("click", () => {
      searchOverlay.classList.remove("active");
    });

    overlaySearchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const query = overlaySearchInput.value.trim();
      if (!query) return;
      window.location.href = `index.html?q=${encodeURIComponent(query)}`;
    });

    // Transisi
    document.querySelectorAll('a[href]').forEach(link => {
      if (link.target !== "_blank") {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          document.body.classList.add('fade-out');
          const href = this.getAttribute('href');
          setTimeout(() => window.location.href = href, 300);
        });
      }
    });

    // Custom modal
    const modalOverlay = document.createElement("div");
    modalOverlay.id = "custom-modal";
    modalOverlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-header">
          <i class="fas fa-exclamation-triangle"></i> Peringatan
        </div>
        <div class="modal-body">
          Anda akan diarahkan ke situs eksternal di luar Play Pictures untuk mengunduh video. Play Pictures tidak bertanggung jawab atas konten atau keamanan situs tersebut.
        </div>
        <div class="modal-footer">
          <button id="modal-cancel">Batal</button>
          <button id="modal-confirm">Lanjutkan</button>
        </div>
      </div>
    `;
    document.body.appendChild(modalOverlay);

    const modalCancel = document.getElementById("modal-cancel");
    const modalConfirm = document.getElementById("modal-confirm");

    function openModal() {
      modalOverlay.classList.add("active");
    }

    function closeModal() {
      modalOverlay.classList.remove("active");
    }

    modalCancel.addEventListener("click", closeModal);
    modalConfirm.addEventListener("click", () => {
      closeModal();
      window.open(`https://y2mate.com/youtube/${videoId}`, "_blank");
    });
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    // Ganti tombol download ke modal
    dlBtn.removeEventListener("click", null);
    dlBtn.addEventListener("click", openModal);
  </script>
</body>
</html>
