<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TV Jadwal Sholat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --deep:#020617;--main:#0a1128;--card:#111c3a;
  --bdk:#1a3a6c;--bm:#2563eb;--bb:#3b82f6;--bl:#60a5fa;
  --gld:#c9a84c;--gll:#e0c068;--glw:rgba(201,168,76,.3);
  --t1:#f0f4ff;--t2:#94a3b8;--t3:#64748b;
  --bd:rgba(59,130,246,.15);--bg:rgba(201,168,76,.25);
  --r:10px;--rs:6px
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--deep);color:var(--t1)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdk);border-radius:3px}

/* ===== TV GRID LAYOUT ===== */
.tv{
  display:grid;
  grid-template-rows:6.5vh 1fr 5.5vh;
  grid-template-columns:30vw 1fr;
  height:100vh;width:100vw;overflow:hidden;background:var(--deep)
}
/* Header */
.hd{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:0 2vw;background:linear-gradient(90deg,var(--card) 0%,var(--main) 100%);border-bottom:1px solid var(--bg)}
.mn{font-family:'Playfair Display',serif;font-size:clamp(13px,2vw,24px);font-weight:700;color:var(--gld);display:flex;align-items:center;gap:clamp(5px,.7vw,10px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mn i{color:var(--gll);font-size:.85em;flex-shrink:0}
.jb{display:none;background:#15803d;color:#fff;font-size:clamp(7px,.7vw,10px);font-weight:700;padding:1px 7px;border-radius:10px;letter-spacing:1px;flex-shrink:0}
.jb.on{display:inline-flex;align-items:center;gap:3px}
.hd-r{text-align:right;flex-shrink:0}
.hd-tm{font-size:clamp(16px,2.8vw,36px);font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;line-height:1.1}
.hd-dt{font-size:clamp(8px,.9vw,12px);color:var(--t2);line-height:1.2}
.hd-hj{font-size:clamp(7px,.75vw,10px);color:var(--gld);line-height:1.2}

/* Kiri Jadwal */
.lf{grid-row:2;grid-column:1;display:flex;flex-direction:column;background:var(--main);border-right:1px solid var(--bd);padding:clamp(6px,.8vh,12px) clamp(5px,.7vw,12px);overflow:hidden}
.loc{font-size:clamp(7px,.7vw,10px);color:var(--t3);text-align:center;padding:clamp(3px,.4vh,6px) 0;background:var(--card);border-radius:var(--rs);margin-bottom:clamp(4px,.5vh,8px);border:1px solid var(--bd);flex-shrink:0}
.loc i{color:var(--bl)}
.pl{display:flex;flex-direction:column;gap:clamp(2px,.35vh,5px);flex:1;overflow-y:auto}
.pr{display:flex;align-items:center;gap:clamp(5px,.7vw,10px);padding:clamp(4px,.55vh,9px) clamp(5px,.6vw,10px);border-radius:var(--rs);transition:.3s;border:1px solid transparent;position:relative}
.pr.act{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(201,168,76,.06));border-color:var(--bg);box-shadow:0 0 12px rgba(37,99,235,.1),0 0 8px var(--glw)}
.pr.pst{opacity:.3}
.p-ic{width:clamp(24px,2.2vw,34px);height:clamp(24px,2.2vw,34px);display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card);color:var(--t3);font-size:clamp(10px,.9vw,13px);flex-shrink:0}
.pr.act .p-ic{background:linear-gradient(135deg,var(--bm),var(--bdk));color:var(--gld);box-shadow:0 0 8px rgba(37,99,235,.3)}
.p-nm{flex:1;font-size:clamp(10px,1vw,13px);font-weight:500;color:var(--t2);white-space:nowrap}
.pr.act .p-nm{color:var(--t1);font-weight:600}
.p-tm{font-size:clamp(12px,1.3vw,18px);font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.pr.act .p-tm{color:var(--gld)}
.pul{position:absolute;left:clamp(3px,.4vw,7px);top:50%;transform:translateY(-50%);width:5px;height:5px;background:var(--gld);border-radius:50%;animation:pg 2s ease-in-out infinite}
@keyframes pg{0%,100%{box-shadow:0 0 3px var(--gld),0 0 5px var(--glw)}50%{box-shadow:0 0 5px var(--gld),0 0 12px var(--glw);opacity:.5}}

/* Kanan Slide+LT */
.rt{grid-row:2;grid-column:2;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#000}
.sl-c{flex:1;position:relative;overflow:hidden}
.sl-c img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s}
.sl-c img.on{opacity:1}
.sl-ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(2,6,23,.55) 100%);pointer-events:none}
.sl-df{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(10,17,40,.5),var(--deep));gap:1.5vh}
.sl-df i{font-size:clamp(28px,5vw,56px);color:var(--bdk);opacity:.6}
.sl-df span{font-size:clamp(9px,.9vw,13px);color:var(--t3)}
.lt-c{position:absolute;bottom:0;left:0;right:0;z-index:2}
.lt-b{padding:clamp(7px,.8vh,12px) clamp(8px,1.2vw,20px);background:linear-gradient(90deg,rgba(17,28,58,.94),rgba(10,17,40,.84));backdrop-filter:blur(8px);border-top:2px solid var(--gld);display:flex;align-items:center;gap:clamp(6px,.8vw,12px);transform:translateY(100%);transition:transform .5s;min-height:clamp(36px,4.5vh,52px)}
.lt-b.vis{transform:translateY(0)}
.lt-i{width:clamp(26px,2.5vw,36px);height:clamp(26px,2.5vw,36px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:clamp(10px,1vw,14px);flex-shrink:0;background:linear-gradient(135deg,var(--gld),#a08030)}
.lt-b.tk .lt-i{background:linear-gradient(135deg,#22c55e,#15803d)}
.lt-b.tp .lt-i{background:linear-gradient(135deg,var(--bm),var(--bdk))}
.lt-l{font-size:clamp(6px,.6vw,9px);text-transform:uppercase;letter-spacing:2px;color:var(--gld);font-weight:600;line-height:1.2}
.lt-v{font-size:clamp(10px,1.1vw,15px);color:var(--t1);font-weight:500;line-height:1.3}

/* Footer */
.ft{grid-column:1/-1;display:flex;align-items:center;border-top:1px solid var(--bg);background:linear-gradient(90deg,var(--card),var(--main));overflow:hidden}
.cd-f{padding:0 clamp(6px,.8vw,14px);font-size:clamp(11px,1.4vw,18px);font-weight:700;color:var(--gld);white-space:nowrap;min-width:clamp(80px,12vw,160px);text-align:center;border-right:1px solid var(--bg);display:flex;align-items:center;gap:5px;height:100%;flex-shrink:0}
.cd-f i{font-size:.8em}
.rt-w{flex:1;overflow:hidden;height:100%;display:flex;align-items:center}
.rt-t{white-space:nowrap;animation:mq 40s linear infinite;color:var(--t1);font-size:clamp(10px,1.1vw,14px);padding-left:2vw}
@keyframes mq{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.ib-b{padding:0 clamp(5px,.6vw,10px);font-size:clamp(7px,.7vw,10px);color:var(--gll);white-space:nowrap;border-left:1px solid var(--bg);flex-shrink:0;height:100%;display:flex;align-items:center;gap:3px;overflow:hidden}

/* ===== FULLSCREEN ===== */
.fs{display:none;position:fixed;inset:0;z-index:100;background:#000;justify-content:center;align-items:center;text-align:center}
.fs.on{display:flex}
.fs-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(10,17,40,.8),rgba(2,6,23,.97))}
.fs-sh{position:absolute;inset:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(201,168,76,.03),transparent,rgba(37,99,235,.03),transparent);animation:rot 20s linear infinite;pointer-events:none}
@keyframes rot{to{transform:rotate(360deg)}}
.fs-c{position:relative;z-index:1;max-width:600px;padding:3vh 2vw}
.fs-ic{font-size:clamp(32px,7vw,64px);color:var(--gld);margin-bottom:2vh;animation:br 3s ease-in-out infinite}
@keyframes br{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
.fs-tt{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,56px);font-weight:800;text-shadow:0 0 25px rgba(37,99,235,.3)}
.fs-st{font-size:clamp(13px,2.5vw,24px);color:var(--gld);font-weight:600;margin-bottom:1.5vh}
.aw{display:flex;align-items:center;justify-content:center;gap:3px;height:3vh;margin:1vh 0}
.aw span{width:3px;background:var(--gld);border-radius:2px;animation:wv 1s ease-in-out infinite}
.aw span:nth-child(1){height:30%;animation-delay:0s}.aw span:nth-child(2){height:60%;animation-delay:.1s}.aw span:nth-child(3){height:90%;animation-delay:.2s}.aw span:nth-child(4){height:60%;animation-delay:.3s}.aw span:nth-child(5){height:100%;animation-delay:.4s}.aw span:nth-child(6){height:40%;animation-delay:.5s}.aw span:nth-child(7){height:70%;animation-delay:.6s}
@keyframes wv{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.fs-msg{font-size:clamp(10px,1.4vw,15px);color:var(--t2);line-height:1.6;padding:1.2vh 1.5vw;background:rgba(255,255,255,.03);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:2.5vh}
.fs-cd{font-size:clamp(36px,10vw,90px);font-weight:800;color:var(--gld);font-variant-numeric:tabular-nums;text-shadow:0 0 40px var(--glw);line-height:1}
.fs-cl{font-size:clamp(9px,1vw,13px);color:var(--t3);margin-top:1vh;text-transform:uppercase;letter-spacing:3px}
.fs-ex{position:absolute;bottom:1.5vh;right:1.5vw;z-index:10}
.fs-ex button{opacity:.2;font-size:10px;padding:5px 12px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:rgba(0,0,0,.5);color:#fff;cursor:pointer;transition:.2s}
.fs-ex button:hover{opacity:1}

/* Mute */
.mu{position:fixed;bottom:6.5vh;right:.8vw;z-index:200;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--bd);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:.2s}
.mu:hover{color:var(--gld);border-color:var(--bg)}

/* Link admin */
.adm{position:fixed;bottom:6.5vh;left:.8vw;z-index:200;font-size:9px;color:var(--t3);opacity:0;transition:.3s;text-decoration:none}
.adm:hover{opacity:1;color:var(--bl)}

/* Loading */
.ld{position:fixed;inset:0;background:var(--deep);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s}
.ld.hid{opacity:0;pointer-events:none}
.ld-sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--gld);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-t{color:var(--t2);font-size:11px}
</style>
</head>
<body>

<div class="ld" id="ld"><div class="ld-sp"></div><div class="ld-t">Memuat sistem jadwal sholat...</div></div>

<!-- TV Layout -->
<div class="tv" id="tvGrid">
  <div class="hd">
    <div class="mn"><i class="fas fa-mosque"></i><span id="tvNM">Masjid</span><span class="jb" id="tvJB"><i class="fas fa-star"></i> JUMAT</span></div>
    <div class="hd-r"><div class="hd-tm" id="tvTM">00:00:00</div><div class="hd-dt" id="tvDT">-</div><div class="hd-hj" id="tvHJ"></div></div>
  </div>
  <div class="lf">
    <div class="loc"><i class="fas fa-map-marker-alt"></i> <span id="tvLK">-</span></div>
    <div class="pl" id="pList"></div>
  </div>
  <div class="rt">
    <div class="sl-c" id="slC">
      <div class="sl-df" id="slDf"><i class="fas fa-mosque"></i><span>Masjid Kami</span></div>
      <div class="sl-ov"></div>
    </div>
    <div class="lt-c"><div class="lt-b" id="ltB"><div class="lt-i"><i class="fas fa-info"></i></div><div><div class="lt-l">INFO</div><div class="lt-v" id="ltV">-</div></div></div></div>
  </div>
  <div class="ft">
    <div class="cd-f"><i class="fas fa-hourglass-half"></i><span id="cdT">--:--:--</span></div>
    <div class="rt-w"><div class="rt-t" id="rtT">Selamat datang</div></div>
    <div class="ib-b"><i class="fas fa-star-and-crescent"></i><span id="ibT"></span></div>
  </div>
</div>

<!-- Fullscreen Azan -->
<div class="fs" id="fsAz">
  <div class="fs-bg"></div><div class="fs-sh"></div>
  <div class="fs-c">
    <div class="fs-ic"><i class="fas fa-mosque"></i></div>
    <div class="fs-tt" id="azTT">AZAN</div>
    <div class="fs-st" id="azSN">Shubuh</div>
    <div class="aw"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="fs-msg" id="azMG">Marilah menunaikan sholat</div>
    <div class="fs-cd" id="azCD">03:00</div>
    <div class="fs-cl" id="azCL">Sisa Waktu Azan</div>
  </div>
  <div class="fs-ex"><button onclick="closeFS()"><i class="fas fa-times"></i> Tutup</button></div>
</div>

<!-- Fullscreen Iqamah -->
<div class="fs" id="fsIq">
  <div class="fs-bg"></div><div class="fs-sh"></div>
  <div class="fs-c">
    <div class="fs-ic"><i class="fas fa-person-praying"></i></div>
    <div class="fs-tt">IQAMAH</div>
    <div class="fs-st" id="iqSN">Shubuh</div>
    <div class="aw"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="fs-msg" id="iqMG">Luruskan shaf, rapatkan barisan</div>
    <div class="fs-cd" id="iqCD">00:10</div>
    <div class="fs-cl">Sholat Segera Dimulai</div>
  </div>
  <div class="fs-ex"><button onclick="closeFS()"><i class="fas fa-times"></i> Tutup</button></div>
</div>

<button class="mu" id="muB" onclick="togMute()"><i class="fas fa-volume-up"></i></button>
<a href="admin.html" class="adm"><i class="fas fa-cog"></i> Admin</a>
<audio id="aAz" preload="none"></audio>
<audio id="aMu" preload="none" loop></audio>

<script>
const API='https://script.google.com/macros/s/AKfycbzMe-lngR0znX_CMuD0-I9Dq4lVe-c78OwYf2Mhqa8pM_fuyFop5M5qQas2UC_Hqczd-w/exec';
const KJad='https://api.myquran.com/v2/sholat/jadwal';
const SN=['Imsak','Subuh','Terbit','Dhuha','Dzuhur','Ashar','Maghrib','Isya'];
const SI={Imsak:'fa-moon',Subuh:'fa-cloud-sun',Terbit:'fa-sun',Dhuha:'fa-sun',Dzuhur:'fa-sun',Ashar:'fa-cloud-sun',Maghrib:'fa-moon',Isya:'fa-star'};
const SD=['Subuh','Dzuhur','Ashar','Maghrib','Isya'];
const DI={Subuh:10,Dzuhur:5,Ashar:5,Maghrib:7,Isya:5};
const DA={Imsak:0,Subuh:0,Terbit:0,Dhuha:0,Dzuhur:0,Ashar:0,Maghrib:0,Isya:0};

/* State default */
let S={
  nm:'Masjid Agung',al:'',lok:'Kabupaten Rejang Lebong',
  lat:-3.45,lng:102.6167,kd:'0807',
  jd:{},hij:'',mas:'',
  iq:{...DI},adj:{...DA},
  rt:'Selamat datang di Masjid Kami.',
  lt:{ji:'',jk:'',jm:'',jb:'',ki:'',pi:''},
  sl:[],
  au:'',va:80,da:180,
  mu:{Subuh:'',Dzuhur:'',Ashar:'',Maghrib:'',Isya:''},
  ja:1,jat:'',jit:'',jkh:'',jkt:'',
  hb:[],ri:30,ba:5,bi:3,sd:8,ld:7
};

let jf=false,aCtx=null,muted=false,curFS=null,fsTmr=null;
let slI=0,slT=null,ltI=0,ltT=null,lastAC='',rfTmr=null,muPlay=false,muTmr=null,lastHash='';

const $=id=>document.getElementById(id);
function fmtS(s){s=Math.max(0,Math.floor(s));const m=Math.floor(s/60),h=Math.floor(m/60);return h>0?`${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function nowS(){const d=new Date();return d.getHours()*3600+d.getMinutes()*60+d.getSeconds()}
function t2s(t){if(!t||!t.includes(':'))return 0;const[h,m]=t.split(':').map(Number);return h*3600+m*60}
function adjT(t,k){const a=S.adj[k]||0,s=t2s(t)+a*60,h=Math.floor(s/3600)%24,m=Math.floor((s%3600)/60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`}
function isJum(){return new Date().getDay()===5}

/* Audio */
function gAC(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function beep(dur){if(muted)return;try{const c=gAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=880;g.gain.value=.12;o.connect(g);g.connect(c.destination);const t=c.currentTime;for(let i=0;i<Math.floor(dur);i++){g.gain.setValueAtTime(.12,t+i);g.gain.setValueAtTime(0,t+i+.5)}o.start(t);o.stop(t+dur)}catch(e){}}
function playAzA(){if(muted||!S.au)return;const a=$('aAz');a.src=S.au;a.volume=(S.va||80)/100;a.play().catch(()=>{})}
function stopAzA(){$('aAz').pause();$('aAz').currentTime=0}
function playMut(s){if(muted)return;const u=S.mu[s];if(!u)return;stopMut();const a=$('aMu');a.src=u;a.volume=.3;a.play().catch(()=>{});muPlay=true}
function stopMut(){$('aMu').pause();$('aMu').currentTime=0;muPlay=false;if(muTmr){clearTimeout(muTmr);muTmr=null}}
function togMute(){muted=!muted;$('muB').innerHTML=muted?'<i class="fas fa-volume-mute"></i>':'<i class="fas fa-volume-up"></i>';$('aAz').muted=muted;$('aMu').muted=muted;if(muted)stopMut()}

/* Fetch jadwal */
async function fJad(){
  if(S.kd){
    try{
      const r=await fetch(`${KJad}/${S.kd}/${today()}`),d=await r.json();
      if(d.status&&d.data){
        const j=d.data.jadwal;
        S.jd={Imsak:j.imsak,Subuh:j.subuh,Terbit:j.terbit,Dhuha:j.dhuha,Dzuhur:j.dzuhur,Ashar:j.ashar,Maghrib:j.maghrib,Isya:j.isya};
        S.hij=d.data.tanggal+' '+(d.data.hijri?.tanggal||'');
        S.mas=d.data.tanggal;
        jf=true;rPL();return;
      }
    }catch(e){console.warn('API jadwal gagal:',e)}
  }
  hitLokal();rPL();
}

function hitLokal(){
  const d=new Date(),dy=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);
  const dc=-23.45*Math.cos(2*Math.PI/365*(dy+10)),lr=S.lat*Math.PI/180,dr=dc*Math.PI/180;
  const ch=(-.833-Math.sin(lr)*Math.sin(dr))/(Math.cos(lr)*Math.cos(dr));
  const HA=(ch>1||ch<-1)?12:Math.acos(ch)*180/Math.PI/15;
  const n=12-(S.lng+105)/15;
  const f=h=>{h=((h%24)+24)%24;return`${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h%1)*60)).padStart(2,'0')}`};
  S.jd={Imsak:f(n-HA-.133),Subuh:f(n-HA-.833),Terbit:f(n-HA),Dhuha:f(n-HA+.5),Dzuhur:f(n+.017),Ashar:f(n+HA),Maghrib:f(n+HA),Isya:f(n+HA+.833)};
  S.mas=new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  S.hij='';jf=true;
}

/* Render jadwal */
function rPL(){
  const c=$('pList');c.innerHTML='';const ns=nowS();let nx=null;
  SN.forEach(nm=>{
    const raw=S.jd[nm];if(!raw)return;
    const tm=adjT(raw,nm),sc=t2s(tm),isN=!nx&&sc>ns;
    if(isN)nx={nm,tm,sc};
    const p=sc<=ns&&!isN;
    const d=document.createElement('div');
    d.className='pr'+(isN?' act':'')+(p?' pst':'');
    d.innerHTML=`${isN?'<div class="pul"></div>':''}<div class="p-ic"><i class="fas ${SI[nm]}"></i></div><div class="p-nm">${nm}</div><div class="p-tm">${tm}</div>`;
    c.appendChild(d);
  });
  updCD(nx);
}

function updCD(nx){
  const e=$('cdT');
  if(!nx){
    const n=SN.find(x=>S.jd[x]);
    if(n){e.textContent=fmtS(86400-nowS()+t2s(adjT(S.jd[n],n)))}else{e.textContent='--:--:--'}
    return;
  }
  e.textContent=fmtS(nx.sc-nowS());
  cekAI(nx);
}

/* Cek azan/iqamah */
function cekAI(nx){
  if(!nx||!SD.includes(nx.nm))return;
  const ns=nowS(),df=nx.sc-ns;
  const ck=nx.nm+'-'+Math.floor(ns/4);
  if(ck===lastAC)return;
  if(df<=0&&df>-3){lastAC=ck;startAz(nx.nm)}
}

function startAz(nm){
  if(curFS)return;
  const j=isJum()&&S.ja&&nm==='Dzuhur',dur=S.da||180;
  $('azTT').textContent=j?'SHOLAT JUMAT':'AZAN';
  $('azSN').textContent=j?'Jumat':nm;
  $('azMG').textContent=j?(S.jat||'Marilah menunaikan sholat Jumat'):'Marilah menunaikan sholat '+nm+' berjamaah';
  $('azCD').textContent=fmtS(dur);
  $('azCL').textContent=j?'Menuju Waktu Khutbah':'Sisa Waktu Azan';
  showFS('fsAz');beep(S.ba||5);setTimeout(()=>playAzA(),300);
  let s=dur;clearInterval(fsTmr);
  fsTmr=setInterval(()=>{s--;$('azCD').textContent=fmtS(s);if(s<=0){clearInterval(fsTmr);stopAzA();startIq(nm)}},1000);
}

function startIq(nm){
  const j=isJum()&&S.ja&&nm==='Dzuhur',dur=S.iq[nm]||5;
  $('iqSN').textContent=j?'Jumat':nm;
  $('iqMG').textContent=j?(S.jit||'Dengan meninggalkan segala urusan dunia...'):'Luruskan shaf, rapatkan barisan. Sholat '+nm+' segera dimulai.';
  $('iqCD').textContent=fmtS(dur);
  showFS('fsIq');beep(S.bi||3);
  let s=dur;clearInterval(fsTmr);
  fsTmr=setInterval(()=>{s--;$('iqCD').textContent=fmtS(s);if(s<=0){clearInterval(fsTmr);closeFS();lastAC=nm+'-done-'+Math.floor(nowS()/4)}},1000);
}

function showFS(id){$('tvGrid').style.display='none';document.querySelectorAll('.fs').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');curFS=id}
function closeFS(){clearInterval(fsTmr);stopAzA();stopMut();curFS=null;document.querySelectorAll('.fs').forEach(p=>p.classList.remove('on'));$('tvGrid').style.display='grid'}

/* Murotal */
function cekMut(){
  if(muPlay||muted)return;const ns=nowS();
  const f=SD.find(n=>{const t=S.jd[n];if(!t)return false;const sc=t2s(adjT(t,n));return ns>=sc-600&&ns<sc-30&&S.mu[n]});
  if(f){playMut(f);const sc=t2s(adjT(S.jd[f],f));muTmr=setTimeout(()=>stopMut(),Math.max(0,sc-30-ns)*1000)}
}

/* Clock */
function updClk(){
  const n=new Date();
  $('tvTM').textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  $('tvDT').textContent=S.mas||n.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  $('tvHJ').textContent=S.hij||'';
  $('tvNM').textContent=S.nm||'Masjid';
  $('tvLK').textContent=S.lok||'-';
  const b=$('tvJB');
  if(isJum()&&S.ja)b.classList.add('on');else b.classList.remove('on');
}

/* Slide */
function rSl(){
  const c=$('slC');c.querySelectorAll('img').forEach(i=>i.remove());
  const df=$('slDf');
  if(!S.sl||!S.sl.length){df.style.display='flex';return}
  df.style.display='none';
  S.sl.forEach((u,i)=>{const img=document.createElement('img');img.className=i===0?'on':'';img.src=u;img.onerror=function(){this.remove()};c.insertBefore(img,df)});
  startSl();
}
function startSl(){
  clearInterval(slT);const imgs=$('slC').querySelectorAll('img');
  if(imgs.length<=1)return;slI=0;
  slT=setInterval(()=>{imgs.forEach(i=>i.classList.remove('on'));slI=(slI+1)%imgs.length;if(imgs[slI])imgs[slI].classList.add('on')},(S.sd||8)*1000);
}

/* Low Third */
function startLT(){
  clearInterval(ltT);const items=[];
  if(isJum()&&S.ja){
    if(S.lt.ji)items.push({l:'IMAM JUMAT',v:S.lt.ji,ic:'fa-user-tie',c:''});
    if(S.lt.jk)items.push({l:'KHATIB',v:S.lt.jk,ic:'fa-book-open',c:''});
    if(S.lt.jm)items.push({l:'MUADZIN',v:S.lt.jm,ic:'fa-bullhorn',c:''});
    if(S.lt.jb)items.push({l:'BILAL',v:S.lt.jb,ic:'fa-hand',c:''});
  }
  if(S.lt.ki)items.push({l:'KAS KEUANGAN',v:S.lt.ki,ic:'fa-coins',c:'tk'});
  if(S.lt.pi)items.push({l:'PEMBANGUNAN',v:S.lt.pi,ic:'fa-building',c:'tp'});
  if(!items.length)return;
  ltI=-1;const bar=$('ltB'),dur=(S.ld||7)*1000;
  function nxt(){ltI=(ltI+1)%items.length;const it=items[ltI];bar.className='lt-b vis '+it.c;bar.querySelector('.lt-i').innerHTML=`<i class="fas ${it.ic}"></i>`;bar.querySelector('.lt-l').textContent=it.l;$('ltV').textContent=it.v}
  ltT=setInterval(()=>{bar.classList.remove('vis');setTimeout(nxt,500)},dur+1000);nxt();
}

/* Hari Besar */
function updHB(){
  const td=today();let nx=null;
  (S.hb||[]).forEach(h=>{if(h.t>=td&&(!nx||h.t<nx.t))nx=h});
  const e=$('ibT');if(!nx){e.textContent='';return}
  e.textContent=`${nx.n}: ${Math.ceil((new Date(nx.t)-new Date(td))/864e5)} hari`;
}

/* Running text */
function updRT(){$('rtT').textContent=S.rt||'Selamat datang di Masjid Kami'}

/* Load dari spreadsheet */
async function ldSheet(){
  try{
    const r=await fetch(API+'?action=load'),d=await r.json();
    if(d.status==='success'&&d.data){
      const sv=d.data;
      const g=k=>sv[k];const jp=v=>typeof v==='string'?JSON.parse(v):v;
      if(g('nm'))S.nm=g('nm');
      if(g('al'))S.al=g('al');
      if(g('lok'))S.lok=g('lok');
      if(g('lat')!==undefined&&g('lat')!=='')S.lat=parseFloat(g('lat'));
      if(g('lng')!==undefined&&g('lng')!=='')S.lng=parseFloat(g('lng'));
      if(g('kd'))S.kd=g('kd');
      if(g('rt'))S.rt=g('rt');
      if(g('sl'))S.sl=jp(g('sl'));
      if(g('au'))S.au=g('au');
      if(g('va')!==undefined)S.va=parseInt(g('va'))||80;
      if(g('da')!==undefined)S.da=parseInt(g('da'))||180;
      if(g('iq'))S.iq=jp(g('iq'));
      if(g('adj'))S.adj=jp(g('adj'));
      if(g('mu'))S.mu=jp(g('mu'));
      if(g('lt'))S.lt=jp(g('lt'));
      if(g('ja')!==undefined)S.ja=(g('ja')==='true'||g('ja')===true||g('ja')==='1'||g('ja')===1)?1:0;
      if(g('jat'))S.jat=g('jat');
      if(g('jit'))S.jit=g('jit');
      if(g('jkh'))S.jkh=g('jkh');
      if(g('jkt'))S.jkt=g('jkt');
      if(g('hb'))S.hb=jp(g('hb'));
      if(g('ri')!==undefined)S.ri=parseInt(g('ri'))||30;
      if(g('ba')!==undefined)S.ba=parseInt(g('ba'))||5;
      if(g('bi')!==undefined)S.bi=parseInt(g('bi'))||3;
      if(g('sd')!==undefined)S.sd=parseInt(g('sd'))||8;
      if(g('ld')!==undefined)S.ld=parseInt(g('ld'))||7;
      lastHash=JSON.stringify(sv);
    }
  }catch(e){console.error('Load sheet error:',e)}
}

/* Cek perubahan data */
async function cekChg(){
  try{
    const r=await fetch(API+'?action=load'),d=await r.json();
    if(d.status==='success'&&d.data){
      const h=JSON.stringify(d.data);
      if(h!==lastHash&&lastHash){
        lastHash=h;
        /* Reload halaman saat data berubah */
        window.location.reload();
      }
    }
  }catch(e){}
}

/* Main loop */
function loop(){updClk();if(jf){rPL();cekMut()}}

/* Init */
(async function(){
  await ldSheet();
  await fJad();
  rSl();updRT();startLT();updHB();
  $('ld').classList.add('hid');
  setInterval(loop,1000);loop();
  rfTmr=setInterval(cekChg,(S.ri||30)*1000);
  setInterval(updHB,36e5);
})();
</script>
</body>
