<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Display Masjid - Rejang Lebong</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#04070e;--bg2:#080e1c;--glass:rgba(10,18,38,.72);
  --gold:#c9a84c;--gold-l:#e8d48b;--gold-d:#8b7534;--gold-faint:rgba(201,168,76,.06);
  --text:#eae3d5;--text2:#b5ad9e;--muted:#6b7590;
  --dim:#1e2740;--border:rgba(201,168,76,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
.lx{font-family:'Playfair Display',serif}
.num{font-family:'Cormorant Garamond',serif;font-variant-numeric:tabular-nums}
.mono{font-family:'JetBrains Mono',monospace}

/* Background */
#bgL{position:fixed;inset:0;z-index:0;pointer-events:none}
#bgL::before{content:'';position:absolute;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(26,95,168,.06),transparent 70%);animation:dr1 20s ease-in-out infinite alternate}
#bgL::after{content:'';position:absolute;bottom:-15%;right:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(201,168,76,.04),transparent 70%);animation:dr2 25s ease-in-out infinite alternate}
@keyframes dr1{to{transform:translate(5%,8%)}}
@keyframes dr2{to{transform:translate(-6%,-5%)}}

/* Main Grid */
#app{position:relative;z-index:1;height:100vh;display:grid;grid-template-rows:auto 1fr auto}

/* Header */
.hdr{padding:2vh 3vw;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(8,14,28,.92),rgba(4,7,14,.7));backdrop-filter:blur(12px);position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent)}
.hdr-left{display:flex;align-items:center;gap:1.2vw}
/* Logo Masjid */
.hdr-logo{width:clamp(42px,3.5vw,56px);height:clamp(42px,3.5vw,56px);border-radius:12px;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.18);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:clamp(1.1rem,1.6vw,1.5rem);flex-shrink:0;box-shadow:0 4px 20px rgba(201,168,76,.08);position:relative;overflow:hidden}
.hdr-logo::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(201,168,76,.15),transparent 60%);pointer-events:none}
.hdr-info{display:flex;flex-direction:column;gap:2px}
.hdr-name{font-size:clamp(1.2rem,2vw,1.75rem);font-weight:700;color:var(--gold-l);letter-spacing:.02em;line-height:1.2}
.hdr-addr{font-size:clamp(.6rem,.78vw,.8rem);color:var(--muted);font-weight:300;letter-spacing:.03em}
.hdr-clock{font-size:clamp(2.4rem,4.2vw,3.6rem);font-weight:400;color:var(--gold);letter-spacing:.06em;line-height:1;text-shadow:0 0 40px rgba(201,168,76,.18)}
.hdr-hijri{font-size:clamp(.6rem,.74vw,.78rem);color:var(--gold-d);font-weight:400;letter-spacing:.08em;margin-top:2px}
.hdr-greg{font-size:clamp(.55rem,.68vw,.72rem);color:var(--muted);font-weight:300;margin-top:1px}

/* Content */
.ctn{display:grid;grid-template-columns:minmax(250px,30%) 1fr;overflow:hidden}

/* Prayer Panel */
.pp{padding:3vh 2vw;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border);position:relative}
.pp::after{content:'';position:absolute;top:8%;bottom:8%;right:0;width:1px;background:linear-gradient(180deg,transparent,var(--gold-d),transparent)}
.pp-lbl{font-size:clamp(.54rem,.62vw,.68rem);text-transform:uppercase;letter-spacing:.22em;color:var(--gold-d);font-weight:500;margin-bottom:3vh;padding-left:.3vw;display:flex;align-items:center;gap:8px}
.pp-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-d),transparent)}
.pp-list{display:flex;flex-direction:column;gap:1.6vh}

/* Prayer Card dengan border */
.pc{display:grid;grid-template-columns:46px 1fr auto;align-items:center;padding:2vh 1.4vw;border-radius:12px;transition:all .5s cubic-bezier(.23,1,.32,1);border:1px solid var(--dim);position:relative;gap:.8vw;background:rgba(10,16,30,.3)}
.pc::before{content:'';position:absolute;inset:0;border-radius:12px;background:linear-gradient(90deg,var(--gold-faint),transparent);opacity:0;transition:opacity .5s}
.pc:hover::before{opacity:.5}
.pc:hover{border-color:rgba(201,168,76,.15)}
.pc-ico{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(201,168,76,.06);color:var(--gold-d);font-size:.9em;transition:all .5s}
.pc-body{display:flex;flex-direction:column;gap:2px;padding-left:.5vw}
.pc-nm{font-size:clamp(.82rem,1vw,1.08rem);font-weight:500;color:var(--text2);transition:color .5s;letter-spacing:.01em}
.pc-iq{font-size:clamp(.52rem,.6vw,.65rem);color:var(--dim);font-weight:300;transition:color .5s}
.pc-tm{font-size:clamp(1.2rem,1.5vw,1.65rem);font-weight:500;color:var(--text);text-align:right;transition:all .5s;letter-spacing:.04em}

/* Next Prayer */
.pc.nx{border-color:rgba(201,168,76,.22);background:linear-gradient(90deg,rgba(201,168,76,.08),rgba(201,168,76,.02));box-shadow:0 0 30px rgba(201,168,76,.06),inset 0 0 30px rgba(201,168,76,.03)}
.pc.nx::before{opacity:1}
.pc.nx .pc-ico{background:rgba(201,168,76,.16);color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.12)}
.pc.nx .pc-nm{color:var(--gold-l);font-weight:600}
.pc.nx .pc-iq{color:var(--gold-d)}
.pc.nx .pc-tm{color:var(--gold-l);font-weight:600;font-size:clamp(1.35rem,1.7vw,1.85rem)}
.pc.past{opacity:.3}

/* Media */
.md{position:relative;overflow:hidden;background:#030610}
.sl{position:absolute;inset:0;opacity:0;transition:opacity 2s ease-in-out,transform 8s ease-out;object-fit:cover;width:100%;height:100%;transform:scale(1.03)}
.sl.on{opacity:1;transform:scale(1)}
.md-grad{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(170deg,rgba(4,7,14,.2) 0%,transparent 25%,transparent 50%,rgba(4,7,14,.55) 100%)}

/* PHBI */
.phbi{position:absolute;top:3vh;right:2.5vw;z-index:5;background:var(--glass);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:1.8vh 1.8vw;backdrop-filter:blur(18px);max-width:250px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.phbi-tag{font-size:clamp(.5rem,.56vw,.62rem);text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:600;margin-bottom:.5vh;display:flex;align-items:center;gap:5px}
.phbi-nm{font-size:clamp(.82rem,.95vw,1rem);font-weight:600;color:var(--gold-l);line-height:1.35}
.phbi-cd{font-size:clamp(.68rem,.78vw,.82rem);color:var(--text2);margin-top:.5vh}
.phbi-cd b{color:var(--gold);font-weight:600}

/* ===== LOW THIRD MELAYANG + SMOOTH EXIT ===== */
.lt-wrap{position:absolute;bottom:3.5vh;left:2.5vw;right:2.5vw;z-index:5}
.lt{background:linear-gradient(105deg,rgba(6,12,26,.88),rgba(12,22,44,.75));border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:2.4vh 3vw;display:flex;align-items:center;gap:2.2vw;backdrop-filter:blur(24px);box-shadow:0 12px 50px rgba(0,0,0,.4),inset 0 0 0 1px rgba(201,168,76,.05);transform:translateY(120%);opacity:0;transition:transform .8s cubic-bezier(.23,1,.32,1),opacity .7s ease}
.lt.on{transform:translateY(0);opacity:1}
.lt.out{transform:translateY(15px);opacity:0;transition:transform 1s cubic-bezier(.4,0,1,1),opacity .9s ease .05s}
.lt-badge{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#04070e;font-weight:700;font-size:clamp(.54rem,.6vw,.66rem);padding:.7vh 1.2vw;border-radius:6px;white-space:nowrap;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.lt-body{flex:1;min-width:0}
.lt-title{font-size:clamp(.85rem,1vw,1.08rem);font-weight:600;color:var(--gold-l);margin-bottom:.4vh;letter-spacing:.01em}
.lt-val{font-size:clamp(.78rem,.88vw,.94rem);font-weight:300;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.lt-line{width:1px;height:40px;background:linear-gradient(180deg,transparent,rgba(201,168,76,.3),transparent);flex-shrink:0}

/* Footer */
.ftr{padding:1.8vh 3vw;display:flex;align-items:center;border-top:1px solid var(--border);background:linear-gradient(0deg,rgba(8,14,28,.92),rgba(4,7,14,.7));backdrop-filter:blur(12px);position:relative;gap:2.5vw}
.ftr::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent)}
.cd-box{display:flex;align-items:center;gap:1vw;flex-shrink:0;border-right:1px solid var(--border);padding-right:2.5vw}
.cd-lbl{font-size:clamp(.55rem,.64vw(.7rem);color:var(--muted);font-weight:300;white-space:nowrap}
.cd-row{display:flex;align-items:baseline;gap:.5vw}
.cd-nm{font-size:clamp(.82rem,.98vw,1.05rem);color:var(--gold);font-weight:500}
.cd-tm{font-size:clamp(1.5rem,2.1vw,2.4rem);font-weight:400;color:var(--gold-l);letter-spacing:.06em;text-shadow:0 0 25px rgba(201,168,76,.18)}
.mq{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;padding-left:1vw}
.mq span{white-space:nowrap;animation:sx var(--dur,45s) linear infinite;font-size:clamp(.8rem,.9vw,.96rem);color:var(--text2);font-weight:300}
@keyframes sx{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* ===== OVERLAYS ===== */
.ov{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center}
.ov.on{display:flex}
.ov-bg{position:absolute;inset:0}
.ov-c{position:relative;z-index:2;text-align:center;padding:3vw;max-width:80vw}
.ip{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z' fill='none' stroke='%23c9a84c' stroke-width='.4'/%3E%3Cpath d='M40 12L68 40L40 68L12 40Z' fill='none' stroke='%23c9a84c' stroke-width='.25'/%3E%3Ccircle cx='40' cy='40' r='8' fill='none' stroke='%23c9a84c' stroke-width='.25'/%3E%3C/svg%3E");background-size:80px 80px}
.of{position:absolute;inset:6vh 6vw;border:1px solid rgba(201,168,76,.08);border-radius:24px;pointer-events:none}
.of::before,.of::after{content:'';position:absolute;width:40px;height:40px;border-color:rgba(201,168,76,.25);border-style:solid}
.of::before{top:-1px;left:-1px;border-width:1px 0 0 1px;border-radius:24px 0 0 0}
.of::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;border-radius:0 0 24px 0}

#ovAz .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0e1a30,#04070e 65%)}
.az-txt{font-size:clamp(3.5rem,6.5vw,6rem);font-weight:400;color:var(--gold);line-height:1;letter-spacing:.05em;text-shadow:0 0 60px rgba(201,168,76,.3),0 0 120px rgba(201,168,76,.1);animation:ap 3s ease-in-out infinite alternate}
@keyframes ap{0%{text-shadow:0 0 40px rgba(201,168,76,.25),0 0 80px rgba(201,168,76,.08)}100%{text-shadow:0 0 70px rgba(201,168,76,.4),0 0 150px rgba(201,168,76,.15)}}
.az-sub{font-size:clamp(1rem,1.3vw,1.4rem);color:var(--gold-d);letter-spacing:.25em;text-transform:uppercase;font-weight:400;margin-top:2vh}
.az-tm{font-size:clamp(.82rem,.95vw,1.05rem);color:var(--muted);margin-top:1.5vh;font-weight:300}
.az-hint{font-size:clamp(.65rem,.75vw,.82rem);color:var(--dim);margin-top:5vh;font-weight:300;letter-spacing:.05em}

#ovIq .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0c1628,#04070e)}
.iq-lbl{font-size:clamp(1.5rem,2.4vw,2.4rem);font-weight:400;color:var(--gold-l);letter-spacing:.3em;text-transform:uppercase}
.iq-num{font-size:clamp(5rem,9vw,9rem);font-weight:300;color:var(--gold);line-height:1;margin-top:3vh;text-shadow:0 0 50px rgba(201,168,76,.2)}
.iq-inf{font-size:clamp(.85rem,1vw,1.08rem);color:var(--text2);margin-top:3vh;font-weight:300}

#ovJu .ov-bg{background:radial-gradient(ellipse at 50% 40%,#0a1425,#04070e)}
.ju-ttl{font-size:clamp(2.8rem,5vw,4.5rem);font-weight:400;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 40px rgba(201,168,76,.25)}
.ju-sub{font-size:clamp(.9rem,1.15vw,1.22rem);color:var(--text2);font-weight:300;margin-top:1.5vh}
.ju-g{display:flex;gap:2.5vw;justify-content:center;margin-top:5vh;flex-wrap:wrap}
.ju-c{text-align:center;padding:2.8vh 3vw;background:var(--glass);border:1px solid rgba(201,168,76,.12);border-radius:14px;min-width:160px;backdrop-filter:blur(12px)}
.ju-cl{font-size:clamp(.54rem,.6vw,.66rem);text-transform:uppercase;letter-spacing:.18em;color:var(--gold);margin-bottom:.8vh;font-weight:500}
.ju-cv{font-size:clamp(.88rem,1.02vw,1.1rem);font-weight:500;color:var(--text)}
.ju-ck{font-size:clamp(1.4rem,1.7vw,1.8rem);color:var(--gold);margin-top:4vh;font-weight:400}

#ovBk .ov-bg{background:#010204}
.bk-ck{font-size:clamp(3.5rem,6.5vw,6rem);font-weight:300;color:rgba(201,168,76,.18)}

#ovCu .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0c1628,#04070e)}
.cu-ttl{font-size:clamp(2.2rem,3.8vw,3.5rem);font-weight:400;color:var(--gold);margin-bottom:2.5vh}
.cu-bd{font-size:clamp(1.05rem,1.6vw,1.6rem);font-weight:300;color:var(--text);max-width:65vw;line-height:1.7}

.fi{animation:fi .9s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Error */
#errScr{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2vw}
#errScr.on{display:flex}
#errScr .ei{font-size:3rem;color:var(--gold-d);margin-bottom:1.5vh}
#errScr .et{font-size:1.4rem;color:var(--gold);font-weight:600;margin-bottom:1vh}
#errScr .em{font-size:.9rem;color:var(--muted);max-width:500px;line-height:1.6}
#errScr .eb{margin-top:2vh;padding:10px 28px;border-radius:8px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#04070e;font-weight:600;font-size:.85rem;cursor:pointer;border:none}
</style>
</head>
<body>

<div id="errScr">
  <div class="ei"><i class="fa-solid fa-triangle-exclamation"></i></div>
  <div class="et lx">Terjadi Kesalahan</div>
  <div class="em" id="errMsg">Sistem mengalami error. Silakan refresh halaman.</div>
  <button class="eb" onclick="location.reload()"><i class="fa-solid fa-rotate-right" style="margin-right:6px"></i> Refresh Halaman</button>
</div>

<div id="bgL"></div>

<div id="app">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo"><i class="fa-solid fa-mosque"></i></div>
      <div class="hdr-info">
        <div class="hdr-name lx" id="hName"></div>
        <div class="hdr-addr" id="hAddr"></div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="hdr-clock lx num" id="hClk"></div>
      <div class="hdr-hijri num" id="hHij"></div>
      <div class="hdr-greg" id="hGre"></div>
    </div>
  </header>

  <div class="ctn">
    <aside class="pp">
      <div class="pp-lbl"><i class="fa-solid fa-mosque" style="font-size:.8em"></i> Jadwal Sholat</div>
      <div class="pp-list" id="pLst"></div>
    </aside>

    <section class="md">
      <div id="slBox"></div>
      <div class="md-grad"></div>
      <div class="phbi" id="phbiBox" style="display:none">
        <div class="phbi-tag"><i class="fa-regular fa-star"></i> PHBI</div>
        <div class="phbi-nm" id="phbiNm"></div>
        <div class="phbi-cd" id="phbiCd"></div>
      </div>
      <div class="lt-wrap">
        <div class="lt" id="ltBox">
          <div class="lt-badge" id="ltBdg"></div>
          <div class="lt-line"></div>
          <div class="lt-body">
            <div class="lt-title" id="ltTtl"></div>
            <div class="lt-val" id="ltVal"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="ftr">
    <div class="cd-box">
      <div>
        <div class="cd-lbl">Sholat berikutnya</div>
        <div class="cd-row">
          <span class="cd-nm" id="cdNm"></span>
          <span class="cd-tm num" id="cdTm"></span>
        </div>
      </div>
    </div>
    <div class="mq"><span id="mqTx"></span></div>
  </footer>
</div>

<div id="ovAz" class="ov">
  <div class="ov-bg"></div><div class="ip"></div><div class="of"></div>
  <div class="ov-c fi">
    <div style="font-size:clamp(.68rem,.82vw,.88rem);color:var(--gold-d);letter-spacing:.4em;font-weight:300;text-transform:uppercase;margin-bottom:2vh">Masuk Waktu</div>
    <div class="az-txt lx num">ALLAHU AKBAR</div>
    <div class="az-sub" id="azNm"></div>
    <div class="az-tm num" id="azTm"></div>
    <div class="az-hint">Segera dirikan sholat dalam jamah</div>
  </div>
</div>

<div id="ovIq" class="ov">
  <div class="ov-bg"></div><div class="ip"></div><div class="of"></div>
  <div class="ov-c fi">
    <div class="iq-lbl lx">Tunggu Iqomah</div>
    <div class="iq-num lx num" id="iqNm">00:00</div>
    <div class="iq-inf" id="iqInf"></div>
  </div>
</div>

<div id="ovJu" class="ov">
  <div class="ov-bg"></div><div class="ip"></div><div class="of"></div>
  <div class="ov-c fi">
    <div class="ju-ttl lx num">Jum'at Mubarak</div>
    <div class="ju-sub">Mari memakmurkan masjid dengan sholat berjamaah</div>
    <div class="ju-g" id="juGr"></div>
    <div class="ju-ck lx num" id="juCk"></div>
  </div>
</div>

<div id="ovBk" class="ov">
  <div class="ov-bg"></div>
  <div class="bk-ck lx num" id="bkCk"></div>
</div>

<div id="ovCu" class="ov">
  <div class="ov-bg"></div><div class="ip"></div><div class="of"></div>
  <div class="ov-c fi">
    <div class="cu-ttl lx num" id="cuTtl"></div>
    <div class="cu-bd" id="cuBd"></div>
  </div>
</div>

<script>
window.onerror=function(m,s,l){document.getElementById('errMsg').textContent='Error baris '+l+': '+m;document.getElementById('errScr').classList.add('on');document.getElementById('app').style.display='none';return true};
window.onunhandledrejection=function(e){console.warn('Rejected:',e.reason)};

const DG=Math.PI/180;
const HM=['Muharram','Safar','Rabiul Awal','Rabiul Akhir','Jumadil Awal','Jumadil Akhir','Rajab','Sya\'ban','Ramadhan','Syawal','Dzulqa\'dah','Dzulhijjah'];
const DY=['Minggu','Senin','Selasa','Rabu','Kamis','Jum\'at','Sabtu'];
const MN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const ICO={subuh:'fa-cloud-moon',dzuhur:'fa-sun',asr:'fa-cloud-sun',maghrib:'fa-cloud-moon',isya:'fa-moon'};
const LB={subuh:'Subuh',dzuhur:'Dzuhur',asr:'Ashar',maghrib:'Maghrib',isya:'Isya'};
const OD=['subuh','dzuhur','asr','maghrib','isya'];

const DEF={
  mosque:{name:'Masjid Agung Rejang Lebong',address:'Jl. R. Sukamto, Pasar Baru, Kab. Rejang Lebong, Bengkulu'},
  location:{latitude:-3.4567,longitude:102.5211,timezone:7,city:'Rejang Lebong'},
  calc:{fajrAngle:20,ishaAngle:18,asrMethod:'shafii'},
  adjust:{subuh:0,terbit:0,dhuha:0,dzuhur:0,asr:0,maghrib:0,isya:0},
  iqomah:{subuh:2,dzuhur:3,asr:3,maghrib:2,isya:3},
  azanDuration:180,
  jumat:{imam:'Ust. Ahmad Fauzi, Lc.',khatib:'Ust. Muhammad Rizki, M.Pd.',muadzin:'H. Hasan Basri',bilal:'Bpk. Syamsul Bahri'},
  finance:{kasMasjid:'Rp 15.750.000',kasPembangunan:'Rp 45.200.000',infakJumat:'Rp 2.350.000',lastUpdate:'-'},
  slideshow:{images:['https://picsum.photos/seed/masjidBl1/1920/1080','https://picsum.photos/seed/masjidBl2/1920/1080','https://picsum.photos/seed/masjidBl3/1920/1080','https://picsum.photos/seed/masjidBl4/1920/1080'],interval:8},
  runningText:'Selamat datang di Masjid Agung Rejang Lebong. Mari kita tingkatkan keimanan dan ketaqwaan dengan memperbanyak ibadah. Jaga kebersihan dan ketenangan masjid.',
  phbi:[{name:'Isra Mi\'raj 1446 H',date:'2025-01-27'},{name:'Nuzulul Quran 1446 H',date:'2025-03-01'},{name:'Idul Fitri 1446 H',date:'2025-03-30'},{name:'Idul Adha 1446 H',date:'2025-06-07'}],
  customMessages:[],
  display:{showBlackScreen:true,blackScreenMinutes:15,autoAzan:true,jumatWelcomeMinutes:10},
  password:'admin123',
  spreadsheetUrl:''
};
let S;

function dM(t,s){for(var k in s){if(!s.hasOwnProperty(k))continue;if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])&&t[k]&&typeof t[k]==='object'&&!Array.isArray(t[k])){dM(t[k],s[k])}else{t[k]=s[k]}}return t}
function ld(){try{var r=localStorage.getItem('mosque_settings');S=r?dM(JSON.parse(JSON.stringify(DEF)),JSON.parse(r)):JSON.parse(JSON.stringify(DEF))}catch(e){S=JSON.parse(JSON.stringify(DEF))}if(!Array.isArray(S.phbi))S.phbi=[];if(!Array.isArray(S.customMessages))S.customMessages=[];if(!S.slideshow||!Array.isArray(S.slideshow.images))S.slideshow=JSON.parse(JSON.stringify(DEF.slideshow));if(!S.display)S.display=JSON.parse(JSON.stringify(DEF.display));if(!S.adjust)S.adjust=JSON.parse(JSON.stringify(DEF.adjust));if(!S.iqomah)S.iqomah=JSON.parse(JSON.stringify(DEF.iqomah));if(!S.calc)S.calc=JSON.parse(JSON.stringify(DEF.calc));if(!S.location)S.location=JSON.parse(JSON.stringify(DEF.location));if(!S.mosque)S.mosque=JSON.parse(JSON.stringify(DEF.mosque));if(!S.jumat)S.jumat=JSON.parse(JSON.stringify(DEF.jumat));if(!S.finance)S.finance=JSON.parse(JSON.stringify(DEF.finance));if(typeof S.spreadsheetUrl!=='string')S.spreadsheetUrl=''}
function sv(){try{localStorage.setItem('mosque_settings',JSON.stringify(S))}catch(e){}}
function st(o,k,f){try{var v=o[k];return(v!==undefined&&v!==null)?String(v):f}catch(e){return f}}

function sunP(jd){var D=jd-2451545.0,g=((D*.98560028)%360+357.529+360)%360,q=((D*.98564736)%360+280.459+360)%360,L=((q+1.915*Math.sin(g*DG)+.02*Math.sin(2*g*DG))%360+360)%360,e=23.439-.00000036*D,RA=Math.atan2(Math.cos(e*DG)*Math.sin(L*DG),Math.cos(L*DG))/DG,dec=Math.asin(Math.sin(e*DG)*Math.sin(L*DG))/DG;return{dec:dec,eqt:(q-(((RA%360)+360)%360))/15}}
function hA(alt,lat,dec){var c=(Math.sin(alt*DG)-Math.sin(lat*DG)*Math.sin(dec*DG))/(Math.cos(lat*DG)*Math.cos(dec*DG));return(c<-1||c>1)?0:Math.acos(c)/DG}
function cT(date){try{var jd=date.getTime()/864e5+2440587.5,p=sunP(jd),lat=S.location.latitude,tz=S.location.timezone,lng=S.location.longitude,dh=12+tz-lng/15-p.eqt,af=S.calc.asrMethod==='hanafi'?2:1,asa=Math.atan2(1,af+Math.tan(Math.abs(lat-p.dec)*DG))/DG,fj=S.calc.fajrAngle||20,is=S.calc.ishaAngle||18,t={subuh:dh-hA(-fj,lat,p.dec)/15,dzuhur:dh,asr:dh+hA(asa,lat,p.dec)/15,maghrib:dh+hA(-.8333,lat,p.dec)/15,isya:dh+hA(-is,lat,p.dec)/15},adj=S.adjust||{},r={};for(var k in t){var v=t[k]+(parseInt(adj[k])||0)/60,h=Math.floor(v),m=Math.round((v-h)*60);if(m>=60){h++;m-=60}if(m<0){h--;m+=60}h=((h%24)+24)%24;r[k]=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}return r}catch(e){return{subuh:'05:00',dzuhur:'12:00',asr:'15:15',maghrib:'18:00',isya:'19:15'}}}
function toH(y,m,d){try{var jd=Math.floor(Date.UTC(y,m-1,d)/864e5)+2440587.5,l=Math.floor(jd-1948439.5)+10632,n=Math.floor((l-1)/10631),l2=l-10631*n+354,j=Math.floor((10985-l2)/5316)*Math.floor((50*l2)/17719)+Math.floor(l2/5670)*Math.floor((43*l2)/15238),l3=l2-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29,hm=Math.floor((24*l3)/709);return{year:30*n+j-30,month:hm,day:l3-Math.floor((709*hm)/24)}}catch(e){return{year:1446,month:1,day:1}}}
function tM(t){try{var p=String(t).split(':');return parseInt(p[0])*60+parseInt(p[1])}catch(e){return 0}}
function fC(s){if(!s||s<=0)return'00:00';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0')}

var PT={},mode='norm',trig=new Set(),dStr='',sI=0,sT=null,lI=0,lT=null,iqE=0,mE=0,aK='';

function rP(){try{var n=new Date(),nM=n.getHours()*60+n.getMinutes(),nx=null;for(var i=0;i<OD.length;i++){if(tM(PT[OD[i]])>nM){nx=OD[i];break}}if(!nx)nx=OD[0];var h='';for(var i=0;i<OD.length;i++){var k=OD[i],isN=k===nx,isP=tM(PT[k])<nM,iq=S.iqomah[k]!==undefined?S.iqomah[k]:3;h+='<div class="pc '+(isN?'nx':'')+(isP&&!isN?' past':'')+'"><div class="pc-ico"><i class="fa-solid '+ICO[k]+'"></i></div><div class="pc-body"><div class="pc-nm">'+LB[k]+'</div><div class="pc-iq">Iqomah +'+iq+' menit</div></div><div class="pc-tm num">'+(PT[k]||'--:--')+'</div></div>'}document.getElementById('pLst').innerHTML=h}catch(e){}}

function rC(){try{var n=new Date(),ts=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');document.getElementById('hClk').textContent=ts;document.getElementById('hGre').textContent=DY[n.getDay()]+', '+n.getDate()+' '+MN[n.getMonth()]+' '+n.getFullYear();var hj=toH(n.getFullYear(),n.getMonth()+1,n.getDate());document.getElementById('hHij').textContent=hj.day+' '+HM[hj.month-1]+' '+hj.year+' H';document.getElementById('hName').textContent=st(S.mosque,'name','Masjid');document.getElementById('hAddr').textContent=st(S.mosque,'address','');document.getElementById('bkCk').textContent=ts;document.getElementById('juCk').textContent=ts}catch(e){}}

function rCd(){try{var n=new Date(),ns=n.getHours()*3600+n.getMinutes()*60+n.getSeconds(),np=null,nm=1/0;for(var i=0;i<OD.length;i++){var pt=tM(PT[OD[i]])*60;if(pt>ns&&pt<nm){nm=pt;np=OD[i]}}if(!np){np=OD[0];nm=tM(PT[np])*60+86400}document.getElementById('cdNm').textContent=LB[np];document.getElementById('cdTm').textContent=fC(Math.max(0,Math.floor(nm-ns)))}catch(e){}}

function iS(){try{var b=document.getElementById('slBox');b.innerHTML='';var imgs=S.slideshow&&S.slideshow.images?S.slideshow.images:[];if(!imgs.length){b.innerHTML='<div style="position:absolute;inset:0;background:linear-gradient(135deg,#060c1a,#0a1428,#080e1c)"></div>';return}for(var i=0;i<imgs.length;i++){var img=document.createElement('img');img.className='sl'+(i===0?' on':'');img.src=imgs[i];img.onerror=function(){this.remove()};b.appendChild(img)}sI=0;clearInterval(sT);sT=setInterval(nS,Math.max(3000,(S.slideshow.interval||8)*1000))}catch(e){}}
function nS(){try{var imgs=document.querySelectorAll('.sl');if(imgs.length<2)return;imgs[sI].classList.remove('on');sI=(sI+1)%imgs.length;if(imgs[sI])imgs[sI].classList.add('on')}catch(e){}}

function gLI(){try{var items=[],n=new Date();if(n.getDay()===5&&S.jumat)items.push({badge:"Petugas Jum'at",title:'Imam: '+st(S.jumat,'imam','-'),value:'Khatib: '+st(S.jumat,'khatib','-')+'  •  Muadzin: '+st(S.jumat,'muadzin','-')+'  •  Bilal: '+st(S.jumat,'bilal','-')});if(S.finance){items.push({badge:'Kas Masjid',title:'Kas Masjid',value:st(S.finance,'kasMasjid','-')});items.push({badge:'Pembangunan',title:'Kas Pembangunan',value:st(S.finance,'kasPembangunan','-')});items.push({badge:"Infak Jum'at",title:'Infak Terakhir',value:st(S.finance,'infakJumat','-')})}var ph=nPH();if(ph){var d=Math.ceil((ph.d-new Date())/864e5);items.push({badge:'PHBI',title:ph.name,value:d>0?d+' hari lagi':'Hari ini'})}return items}catch(e){return[]}}

/* Low third dengan smooth exit */
function sL(){try{var items=gLI();if(!items.length)return;var el=document.getElementById('ltBox'),it=items[lI%items.length];document.getElementById('ltBdg').textContent=it.badge;document.getElementById('ltTtl').textContent=it.title;document.getElementById('ltVal').textContent=it.value;el.classList.remove('out');el.classList.add('on');clearTimeout(lT);lT=setTimeout(function(){el.classList.remove('on');el.classList.add('out');setTimeout(function(){el.classList.remove('out');lI++;sL()},1000)},6500)}catch(e){}}

function nPH(){try{var n=new Date(),best=null,bd=1/0;if(!Array.isArray(S.phbi))return null;for(var i=0;i<S.phbi.length;i++){var p=S.phbi[i];if(!p.name||!p.date)continue;var d=new Date(p.date+'T00:00:00'),df=d-n;if(df>=0&&df<bd){bd=df;best={name:p.name,d:d}}}return best}catch(e){return null}}
function rPh(){try{var ph=nPH(),box=document.getElementById('phbiBox');if(!ph){box.style.display='none';return}box.style.display='block';document.getElementById('phbiNm').textContent=ph.name;var d=Math.ceil((ph.d-new Date())/864e5);document.getElementById('phbiCd').innerHTML=d>0?'<b>'+d+'</b> hari lagi':d===0?'<b>Hari ini</b>':'<b>Baru saja</b>'}catch(e){}}

function rMq(){try{var el=document.getElementById('mqTx'),txt=st(S,'runningText','');if(!txt){el.parentElement.style.display='none';return}el.parentElement.style.display='flex';el.textContent=txt;el.style.setProperty('--dur',Math.max(25,txt.length*.15)+'s')}catch(e){}}

function hOv(){try{document.querySelectorAll('.ov').forEach(function(o){o.classList.remove('on')})}catch(e){}}
function sOv(id){try{hOv();document.getElementById(id).classList.add('on')}catch(e){}}
function sNm(){try{hOv();document.getElementById('app').style.display='grid';document.getElementById('errScr').classList.remove('on')}catch(e){}}
function hNm(){try{document.getElementById('app').style.display='none'}catch(e){}}

function tAz(k){try{aK=k;hNm();sOv('ovAz');document.getElementById('azNm').textContent=LB[k]||k;document.getElementById('azTm').textContent=PT[k]||'';mode='azan';mE=Date.now()+(S.azanDuration||180)*1000}catch(e){sNm()}}
function tIq(k){try{hNm();sOv('ovIq');document.getElementById('iqInf').textContent=(LB[k]||'')+' — '+st(S.mosque,'name','');iqE=Date.now()+((S.iqomah&&S.iqomah[k])||3)*6e4;mode='iqo'}catch(e){sNm()}}
function tBk(){try{hNm();sOv('ovBk');mode='black';mE=Date.now()+(S.display.blackScreenMinutes||15)*6e4}catch(e){sNm()}}
function tJu(){try{hNm();var j=S.jumat||{};document.getElementById('juGr').innerHTML='<div class="ju-c"><div class="ju-cl">Imam</div><div class="ju-cv">'+st(j,'imam','-')+'</div></div><div class="ju-c"><div class="ju-cl">Khatib</div><div class="ju-cv">'+st(j,'khatib','-')+'</div></div><div class="ju-c"><div class="ju-cl">Muadzin</div><div class="ju-cv">'+st(j,'muadzin','-')+'</div></div><div class="ju-c"><div class="ju-cl">Bilal</div><div class="ju-cv">'+st(j,'bilal','-')+'</div></div>';sOv('ovJu');mode='jum'}catch(e){sNm()}}
function cCu(){try{if(!Array.isArray(S.customMessages))return false;var n=new Date();for(var i=0;i<S.customMessages.length;i++){var m=S.customMessages[i];if(!m.active)continue;if(m.schedule&&m.scheduleStart&&m.scheduleEnd){try{if(n>=new Date(m.scheduleStart)&&n<=new Date(m.scheduleEnd)){hNm();document.getElementById('cuTtl').textContent=m.title||'';document.getElementById('cuBd').textContent=m.body||'';sOv('ovCu');mode='cust';return true}}catch(e){}}if(m.manual){hNm();document.getElementById('cuTtl').textContent=m.title||'';document.getElementById('cuBd').textContent=m.body||'';sOv('ovCu');mode='cust';return true}}return false}catch(e){return false}}

function cM(){try{if(cCu())return;var n=new Date(),ds=n.toDateString();if(dStr!==ds){trig.clear();dStr=ds}var ns=n.getHours()*3600+n.getMinutes()*60+n.getSeconds(),isJ=n.getDay()===5;if(mode==='azan'){if(Date.now()>=mE)tIq(aK);else return}if(mode==='iqo'){var r=Math.max(0,Math.ceil((iqE-Date.now())/1000));document.getElementById('iqNm').textContent=fC(r);if(Date.now()>=iqE){(S.display&&S.display.showBlackScreen)?tBk():sNm()}else return}if(mode==='black'){if(Date.now()>=mE)sNm();else return}if(mode==='jum'){var dS=tM(PT.dzuhur)*60;if(ns>=dS-30&&!trig.has('j_a')){trig.add('j_a');tAz('dzuhur');return}return}if(mode!=='norm')return;if(isJ&&!trig.has('j_w')){var wS=tM(PT.dzuhur)*60-(S.display.jumatWelcomeMinutes||10)*60;if(ns>=wS){trig.add('j_w');tJu();return}}if(S.display&&S.display.autoAzan){for(var i=0;i<OD.length;i++){var k=OD[i];if(trig.has(k))continue;var pt=tM(PT[k])*60;if(ns>=pt&&ns<pt+30){trig.add(k);tAz(k);return}}}}catch(e){}}

function tick(){try{rC();rCd();cM();if(mode==='norm'){rP();rPh()}}catch(e){}}
function sF(){try{var url=S.spreadsheetUrl;if(!url||!url.trim())return;fetch(url,{mode:'cors'}).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){if(d&&typeof d==='object'){S=dM(JSON.parse(JSON.stringify(DEF)),d);if(!Array.isArray(S.phbi))S.phbi=[];if(!Array.isArray(S.customMessages))S.customMessages=[];sv();PT=cT(new Date());iS();rMq()}}).catch(function(){})}catch(e){}}

function init(){try{ld();PT=cT(new Date());setInterval(function(){try{PT=cT(new Date())}catch(e){}},6e4);rC();rP();rCd();rPh();iS();rMq();setTimeout(sL,2800);sNm();setInterval(tick,1000);setInterval(sF,3e4);sF()}catch(e){document.getElementById('errMsg').textContent='Gagal memuat: '+e.message;document.getElementById('errScr').classList.add('on');document.getElementById('app').style.display='none'}}
init();
</script>
