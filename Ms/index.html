<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Display Masjid - Rejang Lebong</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#04060c;
  --bg2:#080e1a;
  --panel:rgba(8,14,28,.88);
  --border:rgba(160,140,60,.12);
  --border-hi:rgba(200,170,70,.35);
  --gold:#c9a84c;
  --gold-l:#e8d48b;
  --gold-d:#8b7534;
  --blue:#1a5fb4;
  --blue-d:#0e3a70;
  --text:#eae3d5;
  --muted:#6e7a90;
  --dim:#222d44;
  --glass:rgba(10,18,34,.65);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}

/* ===== SCALING: Lock to 16:9 viewport ===== */
#app{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

.fl{font-family:'Playfair Display',serif}

/* ===== HEADER ===== */
.hdr{
  height:clamp(70px,10vh,100px);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,2.5vw,40px);
  background:linear-gradient(180deg,rgba(10,16,30,.97) 0%,rgba(8,12,22,.92) 100%);
  border-bottom:1px solid var(--border);
  position:relative;z-index:20;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-d),var(--gold),var(--gold-d),transparent);
}
.hdr-left{display:flex;flex-direction:column;gap:2px}
.hdr-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(16px,2.2vw,32px);
  font-weight:700;
  color:var(--gold);
  letter-spacing:.02em;
  line-height:1.1;
}
.hdr-addr{font-size:clamp(9px,.85vw,13px);color:var(--muted);font-weight:300;letter-spacing:.03em}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.hdr-clock{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,3.8vw,56px);
  font-weight:800;
  color:var(--gold);
  letter-spacing:.04em;
  line-height:1;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 30px rgba(201,168,76,.18);
}
.hdr-hijri{font-size:clamp(9px,.8vw,12px);color:var(--gold-d);font-weight:400;letter-spacing:.06em}
.hdr-greg{font-size:clamp(9px,.78vw,12px);color:var(--muted);font-weight:300}

/* ===== MAIN ===== */
.mn{flex:1;display:flex;overflow:hidden;min-height:0}

/* ===== PRAYER PANEL ===== */
.pp{
  width:clamp(260px,28vw,380px);
  flex-shrink:0;
  display:flex;flex-direction:column;
  padding:clamp(8px,1.2vh,16px) clamp(10px,1vw,18px);
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  border-right:1px solid var(--border);
  position:relative;
  z-index:10;
}
.pp-title{
  font-size:clamp(8px,.7vw,11px);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:var(--gold-d);
  margin-bottom:clamp(4px,.6vh,10px);
  display:flex;align-items:center;gap:6px;
}
.pp-title i{font-size:.9em}
.pp-date{color:var(--dim);font-weight:400;letter-spacing:.06em;text-transform:none}
.pp-list{flex:1;display:flex;flex-direction:column;justify-content:center;gap:clamp(3px,.45vh,6px)}

/* Prayer Card */
.pc{
  display:flex;align-items:center;
  padding:clamp(7px,.9vh,12px) clamp(8px,.8vw,14px);
  border-radius:8px;
  border:1px solid transparent;
  transition:all .5s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}
.pc::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(100deg,rgba(201,168,76,.05) 0%,transparent 60%);
  opacity:0;transition:opacity .5s;
}
.pc:hover::before{opacity:1}
.pc.next{
  border-color:var(--border-hi);
  background:linear-gradient(100deg,rgba(201,168,76,.08) 0%,rgba(201,168,76,.01) 100%);
  box-shadow:0 0 20px rgba(201,168,76,.06),inset 0 0 20px rgba(201,168,76,.03);
}
.pc.next::before{opacity:1}
.pc.past{opacity:.35}

.pc-icon{
  width:clamp(28px,2.4vw,38px);height:clamp(28px,2.4vw,38px);
  display:flex;align-items:center;justify-content:center;
  border-radius:7px;
  background:rgba(201,168,76,.07);
  color:var(--gold-d);
  font-size:clamp(.7em,.85vw,1em);
  margin-right:clamp(6px,.7vw,12px);
  flex-shrink:0;
  transition:all .5s;
}
.pc.next .pc-icon{
  background:rgba(201,168,76,.18);
  color:var(--gold);
  box-shadow:0 0 12px rgba(201,168,76,.15);
}
.pc-name{
  font-weight:500;
  font-size:clamp(.75em,.9vw,1em);
  color:var(--muted);
  min-width:clamp(55px,5vw,75px);
  transition:color .5s;
}
.pc.next .pc-name{color:var(--gold-l);font-weight:600}
.pc-iqomah{
  font-size:clamp(.6em,.65vw,.75em);
  color:var(--dim);
  margin-left:clamp(4px,.4vw,8px);
  font-weight:300;
}
.pc-time{
  font-weight:600;
  font-size:clamp(.85em,1.05vw,1.15em);
  color:var(--text);
  margin-left:auto;
  font-variant-numeric:tabular-nums;
  letter-spacing:.04em;
  transition:all .5s;
}
.pc.next .pc-time{color:var(--gold);font-weight:700;font-size:clamp(.95em,1.2vw,1.3em)}
.pc-dot{
  width:clamp(5px,.4vw,8px);height:clamp(5px,.4vw,8px);
  border-radius:50%;
  margin-left:clamp(5px,.5vw,10px);
  flex-shrink:0;
  background:var(--dim);
  transition:all .5s;
}
.pc.next .pc-dot{
  background:var(--gold);
  box-shadow:0 0 8px var(--gold);
  animation:pDot 1.5s ease-in-out infinite;
}
@keyframes pDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.4}}

/* ===== MEDIA PANEL ===== */
.mp{flex:1;position:relative;overflow:hidden}
.mp img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s ease-in-out}
.mp img.on{opacity:1}
.mp::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(4,6,12,.25) 0%,transparent 25%,transparent 55%,rgba(4,6,12,.65) 100%),
    linear-gradient(90deg,rgba(4,6,12,.3) 0%,transparent 15%);
}

/* ===== PHBI CARD ===== */
.phbi{
  position:absolute;top:clamp(8px,1.5vh,20px);right:clamp(8px,1.2vw,20px);
  z-index:5;
  background:var(--glass);
  backdrop-filter:blur(12px);
  border:1px solid var(--border-hi);
  border-radius:10px;
  padding:clamp(8px,1vh,14px) clamp(10px,1vw,16px);
  max-width:clamp(160px,16vw,230px);
}
.phbi-lbl{font-size:clamp(.55em,.58vw,.7em);text-transform:uppercase;letter-spacing:.15em;color:var(--gold);font-weight:600;margin-bottom:3px}
.phbi-nm{font-weight:600;font-size:clamp(.7em,.82vw,1em);color:var(--gold-l);line-height:1.25;margin-bottom:2px}
.phbi-cd{font-size:clamp(.6em,.7vw,.85em);color:var(--muted)}
.phbi-cd b{color:var(--gold);font-weight:600}

/* ===== LOW THIRD ===== */
.lt{position:absolute;bottom:0;left:0;right:0;z-index:5}
.lt-in{
  background:linear-gradient(100deg,rgba(6,10,20,.92) 0%,rgba(6,10,20,.72) 100%);
  backdrop-filter:blur(14px);
  border-top:2px solid var(--gold-d);
  padding:clamp(8px,1.2vh,16px) clamp(12px,1.5vw,24px);
  display:flex;align-items:center;gap:clamp(8px,1vw,18px);
  transform:translateY(100%);
  transition:transform .65s cubic-bezier(.22,1,.36,1);
}
.lt-in.show{transform:translateY(0)}
.lt-badge{
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  color:#050810;font-weight:700;
  font-size:clamp(.55em,.6vw,.72em);
  padding:clamp(3px,.3vh,5px) clamp(6px,.6vw,10px);
  border-radius:4px;
  white-space:nowrap;
  text-transform:uppercase;
  letter-spacing:.06em;
  flex-shrink:0;
}
.lt-body{flex:1;min-width:0}
.lt-t{font-weight:600;font-size:clamp(.7em,.82vw,1em);color:var(--gold-l);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lt-v{font-weight:300;font-size:clamp(.65em,.75vw,.9em);color:var(--text);margin-top:1px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== FOOTER ===== */
.ftr{
  height:clamp(50px,8vh,72px);
  flex-shrink:0;
  display:flex;align-items:center;
  background:linear-gradient(0deg,rgba(10,16,30,.97) 0%,rgba(8,12,22,.92) 100%);
  border-top:1px solid var(--border);
  position:relative;z-index:20;
}
.ftr::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-d),var(--gold),var(--gold-d),transparent);
}
.ftr-cd{
  display:flex;align-items:center;gap:clamp(6px,.7vw,14px);
  padding:0 clamp(16px,2.5vw,40px);
  flex-shrink:0;
  border-right:1px solid var(--border);
  height:100%;
}
.ftr-cd-lbl{font-size:clamp(.6em,.68vw,.82em);color:var(--muted);white-space:nowrap;font-weight:300}
.ftr-cd-row{display:flex;align-items:baseline;gap:clamp(3px,.3vw,6px)}
.ftr-cd-nm{font-size:clamp(.75em,.85vw,1em);color:var(--gold-l);font-weight:500}
.ftr-cd-tm{
  font-size:clamp(1.1em,1.5vw,1.9em);
  font-weight:700;
  color:var(--gold);
  font-variant-numeric:tabular-nums;
  letter-spacing:.05em;
  text-shadow:0 0 14px rgba(201,168,76,.2);
}
.ftr-run{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;padding:0 clamp(12px,1.5vw,24px)}
.ftr-run-t{
  white-space:nowrap;
  animation:runL var(--dur,45s) linear infinite;
  font-size:clamp(.75em,.88vw,1.05em);
  color:var(--text);
  font-weight:300;
  letter-spacing:.02em;
}
@keyframes runL{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

/* ===================================================
   OVERLAY SCREENS
   =================================================== */
.ov{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center}
.ov.on{display:flex}
.ov-bg{position:absolute;inset:0}
.ov-ct{position:relative;z-index:2;text-align:center;padding:2vw}

.isl-pat{
  position:absolute;inset:0;opacity:.05;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z' fill='none' stroke='%23c9a84c' stroke-width='.4'/%3E%3Cpath d='M40 12L68 40L40 68L12 40Z' fill='none' stroke='%23c9a84c' stroke-width='.25'/%3E%3Ccircle cx='40' cy='40' r='6' fill='none' stroke='%23c9a84c' stroke-width='.25'/%3E%3Ccircle cx='40' cy='40' r='14' fill='none' stroke='%23c9a84c' stroke-width='.15'/%3E%3C/svg%3E");
  background-size:80px 80px;
}
.ov-frame{
  position:absolute;
  inset:clamp(40px,6vh,80px) clamp(60px,8vw,140px);
  border:1px solid var(--border);
  border-radius:16px;
  pointer-events:none;
}
.ov-frame::before,.ov-frame::after{
  content:'';position:absolute;width:clamp(20px,2.5vw,36px);height:clamp(20px,2.5vw,36px);
  border-color:var(--gold-d);border-style:solid;
}
.ov-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:16px 0 0 0}
.ov-frame::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;border-radius:0 0 16px 0}

/* --- AZAN --- */
#ovAzan .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0c1830 0%,#060a14 65%,#04060c 100%)}
.az-label{
  font-size:clamp(.9em,1.3vw,1.8em);
  color:var(--gold-d);
  letter-spacing:.4em;
  font-weight:300;
  margin-bottom:clamp(8px,1.5vh,20px);
  text-transform:uppercase;
}
.az-main{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8em,5.5vw,8em);
  font-weight:900;
  color:var(--gold);
  line-height:1;
  letter-spacing:.06em;
  text-shadow:0 0 50px rgba(201,168,76,.3),0 0 120px rgba(201,168,76,.1);
  animation:azGlow 2.5s ease-in-out infinite alternate;
}
@keyframes azGlow{
  0%{text-shadow:0 0 40px rgba(201,168,76,.25),0 0 80px rgba(201,168,76,.08)}
  100%{text-shadow:0 0 60px rgba(201,168,76,.4),0 0 150px rgba(201,168,76,.15)}
}
.az-prayer{
  font-size:clamp(1em,1.8vw,2.8em);
  font-weight:300;
  color:var(--gold-l);
  margin-top:clamp(10px,2vh,30px);
  letter-spacing:.2em;
  text-transform:uppercase;
}
.az-time{
  font-size:clamp(.7em,1vw,1.5em);
  color:var(--muted);
  margin-top:clamp(6px,1vh,14px);
  font-weight:300;
  font-variant-numeric:tabular-nums;
}
.az-sub{
  font-size:clamp(.6em,.8vw,1.1em);
  color:var(--dim);
  margin-top:clamp(12px,2.5vh,30px);
  font-weight:300;
  letter-spacing:.08em;
}

/* --- IQOMAH --- */
#ovIqo .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0c1830 0%,#060a14 65%,#04060c 100%)}
.iq-label{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.2em,2.2vw,3.2em);
  font-weight:600;
  color:var(--gold-l);
  letter-spacing:.25em;
  text-transform:uppercase;
}
.iq-num{
  font-family:'Playfair Display',serif;
  font-size:clamp(4em,8vw,12em);
  font-weight:200;
  color:var(--gold);
  line-height:1;
  margin-top:clamp(10px,2vh,25px);
  text-shadow:0 0 40px rgba(201,168,76,.2);
  font-variant-numeric:tabular-nums;
}
.iq-info{
  font-size:clamp(.65em,.85vw,1.2em);
  color:var(--muted);
  margin-top:clamp(12px,2vh,25px);
  font-weight:300;
}

/* --- JUMAT --- */
#ovJum .ov-bg{background:radial-gradient(ellipse at 50% 40%,#0a1428 0%,#060a14 60%,#04060c 100%)}
.jm-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2em,3.8vw,5.5em);
  font-weight:900;
  color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,.25);
  letter-spacing:.08em;
  line-height:1.1;
}
.jm-sub{
  font-size:clamp(.7em,1vw,1.5em);
  color:var(--gold-l);
  font-weight:300;
  margin-top:clamp(6px,1vh,14px);
  letter-spacing:.1em;
}
.jm-grid{
  margin-top:clamp(16px,3vh,40px);
  display:flex;gap:clamp(12px,2vw,30px);
  justify-content:center;flex-wrap:wrap;
}
.jm-card{
  text-align:center;
  padding:clamp(12px,1.8vh,22px) clamp(14px,2vw,30px);
  background:rgba(201,168,76,.04);
  border:1px solid var(--border);
  border-radius:12px;
  min-width:clamp(120px,12vw,180px);
  backdrop-filter:blur(8px);
}
.jm-card-lbl{
  font-size:clamp(.5em,.58vw,.72em);
  text-transform:uppercase;
  letter-spacing:.18em;
  color:var(--gold);
  margin-bottom:clamp(4px,.5vh,8px);
  font-weight:600;
}
.jm-card-val{
  font-size:clamp(.8em,1vw,1.4em);
  font-weight:600;
  color:var(--text);
  line-height:1.3;
}
.jm-clk{
  font-family:'Playfair Display',serif;
  font-size:clamp(1em,1.6vw,2.2em);
  color:var(--gold);
  margin-top:clamp(14px,2.5vh,30px);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 10px rgba(201,168,76,.15);
}

/* --- BLACK --- */
#ovBlack .ov-bg{background:#020204}
.bl-clk{
  font-family:'Playfair Display',serif;
  font-size:clamp(3em,6vw,9em);
  font-weight:200;
  color:rgba(201,168,76,.18);
  font-variant-numeric:tabular-nums;
}

/* --- CUSTOM MSG --- */
#ovCust .ov-bg{background:radial-gradient(ellipse at 50% 45%,#0c1830 0%,#060a14 65%,#04060c 100%)}
.cm-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5em,3vw,4.5em);
  font-weight:800;
  color:var(--gold);
  margin-bottom:clamp(8px,1.5vh,20px);
  line-height:1.15;
}
.cm-body{
  font-size:clamp(.85em,1.4vw,2em);
  font-weight:300;
  color:var(--text);
  max-width:70vw;
  line-height:1.6;
  letter-spacing:.02em;
}

.fadein{animation:fi .8s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<!-- ===================== NORMAL DISPLAY ===================== -->
<div id="app">
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-name" id="mosqueName"></div>
      <div class="hdr-addr" id="mosqueAddr"></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-clock" id="clock"></div>
      <div class="hdr-hijri" id="hijriDate"></div>
      <div class="hdr-greg" id="gregDate"></div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="mn">
    <!-- PRAYER PANEL -->
    <aside class="pp">
      <div class="pp-title"><i class="fa-solid fa-mosque"></i> Jadwal Sholat <span class="pp-date" id="dateLabel"></span></div>
      <div class="pp-list" id="prayerList"></div>
    </aside>

    <!-- MEDIA PANEL -->
    <section class="mp" id="mediaPanel">
      <div id="slideBox"></div>
      <!-- PHBI -->
      <div class="phbi" id="phbiCard" style="display:none">
        <div class="phbi-lbl"><i class="fa-solid fa-star-and-crescent"></i> PHBI</div>
        <div class="phbi-nm" id="phbiName"></div>
        <div class="phbi-cd" id="phbiCountdown"></div>
      </div>
      <!-- LOW THIRD -->
      <div class="lt">
        <div class="lt-in" id="lowThird">
          <div class="lt-badge" id="ltBadge"></div>
          <div class="lt-body">
            <div class="lt-t" id="ltTitle"></div>
            <div class="lt-v" id="ltValue"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="ftr">
    <div class="ftr-cd">
      <div>
        <div class="ftr-cd-lbl">Sholat berikutnya</div>
        <div class="ftr-cd-row">
          <span class="ftr-cd-nm" id="cdPrayer"></span>
          <span class="ftr-cd-tm" id="cdTime"></span>
        </div>
      </div>
    </div>
    <div class="ftr-run">
      <div class="ftr-run-t" id="marqueeText"></div>
    </div>
  </footer>
</div>

<!-- ===================== AZAN OVERLAY ===================== -->
<div id="ovAzan" class="ov">
  <div class="ov-bg"></div>
  <div class="isl-pat"></div>
  <div class="ov-frame"></div>
  <div class="ov-ct fadein">
    <div class="az-label">SHOLAT</div>
    <div class="az-main">ALLAHU AKBAR</div>
    <div class="az-prayer" id="azanPrayerName"></div>
    <div class="az-time" id="azanTime"></div>
    <div class="az-sub">Segera dirikan sholat dalam jamah</div>
  </div>
</div>

<!-- ===================== IQOMAH OVERLAY ===================== -->
<div id="ovIqo" class="ov">
  <div class="ov-bg"></div>
  <div class="isl-pat"></div>
  <div class="ov-frame"></div>
  <div class="ov-ct fadein">
    <div class="iq-label fl">TUNGGU IQOMAH</div>
    <div class="iq-num fl" id="iqomahCount">00:00</div>
    <div class="iq-info" id="iqomahPrayer"></div>
  </div>
</div>

<!-- ===================== JUMAT OVERLAY ===================== -->
<div id="ovJum" class="ov">
  <div class="ov-bg"></div>
  <div class="isl-pat"></div>
  <div class="ov-frame"></div>
  <div class="ov-ct fadein">
    <div class="jm-title fl">JUMAT MUBARAK</div>
    <div class="jm-sub">Mari memakmurkan masjid dengan sholat berjamaah</div>
    <div class="jm-grid" id="jumatInfo"></div>
    <div class="jm-clk fl" id="jumatClock"></div>
  </div>
</div>

<!-- ===================== BLACK OVERLAY ===================== -->
<div id="ovBlack" class="ov">
  <div class="ov-bg"></div>
  <div class="bl-clk fl" id="blackClock"></div>
</div>

<!-- ===================== CUSTOM MSG OVERLAY ===================== -->
<div id="ovCust" class="ov">
  <div class="ov-bg"></div>
  <div class="isl-pat"></div>
  <div class="ov-frame"></div>
  <div class="ov-ct fadein">
    <div class="cm-title fl" id="customTitle"></div>
    <div class="cm-body" id="customBody"></div>
  </div>
</div>

<script>
/* ============================
   KONSTANTA
   ============================ */
const DG=Math.PI/180;
const HHIJ=['Muharram','Safar','Rabiul Awal','Rabiul Akhir','Jumadil Awal','Jumadil Akhir','Rajab','Sya\'ban','Ramadhan','Syawal','Dzulqa\'dah','Dzulhijjah'];
const HDAY=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const HMON=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const ICO={subuh:'fa-cloud-moon',terbit:'fa-sun',dhuha:'fa-sun',dzuhur:'fa-sun',asr:'fa-cloud-sun',maghrib:'fa-cloud-moon',isya:'fa-moon'};
const NM={subuh:'Subuh',terbit:'Syuruq',dhuha:'Dhuha',dzuhur:'Dzuhur',asr:'Ashar',maghrib:'Maghrib',isya:'Isya'};
const PO=['subuh','terbit','dhuha','dzuhur','asr','maghrib','isya'];
const AZ=['subuh','dzuhur','asr','maghrib','isya'];

/* ============================
   DEFAULTS
   ============================ */
const DEF={
  mosque:{name:'Masjid Agung Rejang Lebong',address:'Jl. R. Sukamto, Pasar Baru, Kab. Rejang Lebong, Bengkulu'},
  location:{latitude:-3.4567,longitude:102.5211,timezone:7,city:'Rejang Lebong'},
  calc:{fajrAngle:20,ishaAngle:18,asrMethod:'shafii'},
  adjust:{subuh:0,terbit:0,dhuha:0,dzuhur:0,asr:0,maghrib:0,isya:0},
  iqomah:{subuh:2,dzuhur:3,asr:3,maghrib:2,isya:3},
  azanDuration:180,
  jumat:{imam:'Ust. Ahmad Fauzi, Lc.',khatib:'Ust. Muhammad Rizki, M.Pd.',muadzin:'H. Hasan Basri',bilal:'Bpk. Syamsul Bahri'},
  finance:{kasMasjid:'Rp 15.750.000',kasPembangunan:'Rp 45.200.000',infakJumat:'Rp 2.350.000',lastUpdate:'-'},
  slideshow:{images:['https://picsum.photos/seed/masjidRL1/1920/1080','https://picsum.photos/seed/masjidRL2/1920/1080','https://picsum.photos/seed/masjidRL3/1920/1080','https://picsum.photos/seed/masjidRL4/1920/1080'],interval:8},
  runningText:'Selamat datang di Masjid Agung Rejang Lebong. Mari kita tingkatkan keimanan dan ketaqwaan dengan memperbanyak ibadah. Jaga kebersihan dan ketenangan masjid.',
  phbi:[{name:'Isra Mi\'raj 1446 H',date:'2025-01-27'},{name:'Nuzulul Quran 1446 H',date:'2025-03-01'},{name:'Idul Fitri 1446 H',date:'2025-03-30'},{name:'Idul Adha 1446 H',date:'2025-06-07'}],
  customMessages:[],
  display:{showBlackScreen:true,blackScreenMinutes:15,autoAzan:true,jumatWelcomeMinutes:10},
  password:'admin123',
  spreadsheetUrl:''
};

let S;
function ldS(){
  try{const d=localStorage.getItem('mosque_settings');S=d?{...DEF,...JSON.parse(d)}:{...DEF};}
  catch(e){S={...DEF};}
  if(!Array.isArray(S.phbi))S.phbi=[];
  if(!Array.isArray(S.customMessages))S.customMessages=[];
  if(!S.slideshow)S.slideshow=DEF.slideshow;
  if(!S.display)S.display=DEF.display;
  if(!S.adjust)S.adjust=DEF.adjust;
  if(!S.iqomah)S.iqomah=DEF.iqomah;
  if(typeof S.spreadsheetUrl==='undefined')S.spreadsheetUrl='';
}
function svS(){localStorage.setItem('mosque_settings',JSON.stringify(S));}

/* ============================
   PRAYER CALC
   ============================ */
function norm(v,mx){v=v%mx;return v<0?v+mx:v;}
function sunPos(jd){
  const D=jd-2451545.0;
  const g=norm(357.529+0.98560028*D,360);
  const q=norm(280.459+0.98564736*D,360);
  const L=norm(q+1.915*Math.sin(g*DG)+0.020*Math.sin(2*g*DG),360);
  const e=23.439-0.00000036*D;
  const RA=Math.atan2(Math.cos(e*DG)*Math.sin(L*DG),Math.cos(L*DG))/DG;
  const dec=Math.asin(Math.sin(e*DG)*Math.sin(L*DG))/DG;
  return{dec,eqt:(q-norm(RA,360))/15};
}
function hAngle(alt,lat,dec){
  const c=(Math.sin(alt*DG)-Math.sin(lat*DG)*Math.sin(dec*DG))/(Math.cos(lat*DG)*Math.cos(dec*DG));
  return(c<-1||c>1)?0:Math.acos(c)/DG;
}
function calcPT(date){
  const jd=date.getTime()/86400000+2440587.5;
  const{dec,eqt}=sunPos(jd);
  const lat=S.location.latitude,tz=S.location.timezone,lng=S.location.longitude;
  const dh=12+tz-lng/15-eqt;
  const af=S.calc.asrMethod==='hanafi'?2:1;
  const asa=Math.atan2(1,af+Math.tan(Math.abs(lat-dec)*DG))/DG;
  const t={
    subuh:dh-hAngle(-S.calc.fajrAngle,lat,dec)/15,
    terbit:dh-hAngle(-0.8333,lat,dec)/15,
    dhuha:dh+hAngle(4.5,lat,dec)/15,
    dzuhur:dh,
    asr:dh+hAngle(asa,lat,dec)/15,
    maghrib:dh+hAngle(-0.8333,lat,dec)/15,
    isya:dh+hAngle(-S.calc.ishaAngle,lat,dec)/15
  };
  const r={};
  for(const k in t){
    let v=t[k]+S.adjust[k]/60;let h=Math.floor(v);let m=Math.round((v-h)*60);
    if(m>=60){h++;m-=60;}if(m<0){h--;m+=60;}
    h=((h%24)+24)%24;
    r[k]=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  return r;
}

/* ============================
   HIJRI
   ============================ */
function toHijri(y,m,d){
  const jd=Math.floor(Date.UTC(y,m-1,d)/86400000)+2440587.5;
  const l=Math.floor(jd-1948439.5)+10632;
  const n=Math.floor((l-1)/10631);
  const l2=l-10631*n+354;
  const j=Math.floor((10985-l2)/5316)*Math.floor((50*l2)/17719)+Math.floor(l2/5670)*Math.floor((43*l2)/15238);
  const l3=l2-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const hm=Math.floor((24*l3)/709);
  const hd=l3-Math.floor((709*hm)/24);
  return{year:30*n+j-30,month:hm,day:hd};
}

/* ============================
   UTILS
   ============================ */
function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function fmtCd(sec){
  if(sec<=0)return'00:00';
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return h>0?String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* ============================
   STATE
   ============================ */
let pTimes={},mode='normal',trig=new Set(),dateStr='',sIdx=0,sTmr=null,lIdx=0,lTmr=null,iqEnd=0,mEnd=0,azKey='';

/* ============================
   RENDER PRAYER LIST
   ============================ */
function renderPL(){
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  let nxt=null;
  for(const k of AZ){const p=t2m(pTimes[k]);if(p>nm){nxt=k;break;}}
  if(!nxt)nxt=AZ[0];
  let h='';
  for(const k of PO){
    const isN=k===nxt,isA=AZ.includes(k),pt=t2m(pTimes[k]),isP=pt<nm;
    h+=`<div class="pc ${isN?'next':''} ${isP&&!isN?'past':''}">
      <div class="pc-icon"><i class="fa-solid ${ICO[k]||'fa-clock'}"></i></div>
      <div class="pc-name">${NM[k]}</div>
      ${isA?`<div class="pc-iqomah">+${S.iqomah[k]}m</div>`:''}
      <div class="pc-time">${pTimes[k]}</div>
      <div class="pc-dot"></div>
    </div>`;
  }
  document.getElementById('prayerList').innerHTML=h;
}

/* ============================
   CLOCK & DATE
   ============================ */
function updClk(){
  const n=new Date();
  const ts=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=ts;
  document.getElementById('gregDate').textContent=HDAY[n.getDay()]+', '+n.getDate()+' '+HMON[n.getMonth()]+' '+n.getFullYear();
  const hj=toHijri(n.getFullYear(),n.getMonth()+1,n.getDate());
  document.getElementById('hijriDate').textContent=hj.day+' '+HHIJ[hj.month-1]+' '+hj.year+' H';
  document.getElementById('dateLabel').textContent=HDAY[n.getDay()]+', '+n.getDate()+'/'+(n.getMonth()+1)+'/'+n.getFullYear();
  document.getElementById('mosqueName').textContent=S.mosque.name;
  document.getElementById('mosqueAddr').textContent=S.mosque.address;
  document.getElementById('blackClock').textContent=ts;
  document.getElementById('jumatClock').textContent=ts;
}

/* ============================
   COUNTDOWN FOOTER
   ============================ */
function updCd(){
  const n=new Date(),ns=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
  let np=null,nm=Infinity;
  for(const k of AZ){const p=t2m(pTimes[k])*60;if(p>ns&&p<nm){nm=p;np=k;}}
  if(!np){np=AZ[0];nm=t2m(pTimes[np])*60+86400;}
  document.getElementById('cdPrayer').textContent=NM[np];
  document.getElementById('cdTime').textContent=fmtCd(Math.max(0,Math.floor(nm-ns)));
}

/* ============================
   SLIDESHOW
   ============================ */
function initSlide(){
  const c=document.getElementById('slideBox');c.innerHTML='';
  const imgs=S.slideshow.images;
  if(!imgs||!imgs.length){c.innerHTML='<div style="position:absolute;inset:0;background:linear-gradient(135deg,#060c1a,#0a1428,#081020)"></div>';return;}
  imgs.forEach((s,i)=>{const img=document.createElement('img');img.className=i===0?'on':'';img.src=s;img.alt='';img.onerror=function(){this.style.display='none';};c.appendChild(img);});
  sIdx=0;clearInterval(sTmr);sTmr=setInterval(()=>{const all=document.querySelectorAll('#slideBox img');if(all.length<2)return;all[sIdx].classList.remove('on');sIdx=(sIdx+1)%all.length;all[sIdx].classList.add('on');},S.slideshow.interval*1000);
}

/* ============================
   LOW THIRD
   ============================ */
function getLT(){
  const items=[],n=new Date();
  if(n.getDay()===5)items.push({b:'Petugas Jumat',t:'Imam: '+S.jumat.imam,v:'Khatib: '+S.jumat.khatib+'  |  Muadzin: '+S.jumat.muadzin+'  |  Bilal: '+S.jumat.bilal});
  items.push({b:'Kas Masjid',t:'Kas Masjid',v:S.finance.kasMasjid});
  items.push({b:'Pembangunan',t:'Kas Pembangunan',v:S.finance.kasPembangunan});
  items.push({b:'Infak Jumat',t:'Infak Jumat Terakhir',v:S.finance.infakJumat});
  const ph=nextPHBI();
  if(ph){const d=Math.ceil((ph.d-n)/864e5);items.push({b:'PHBI',t:ph.n,v:d>0?d+' hari lagi':'Hari ini'});}
  return items;
}
function showLT(){
  const items=getLT();if(!items.length)return;
  const el=document.getElementById('lowThird'),it=items[lIdx%items.length];
  document.getElementById('ltBadge').textContent=it.b;
  document.getElementById('ltTitle').textContent=it.t;
  document.getElementById('ltValue').textContent=it.v;
  el.classList.add('show');
  clearTimeout(lTmr);
  lTmr=setTimeout(()=>{el.classList.remove('show');setTimeout(()=>{lIdx++;showLT();},700);},5500);
}

/* ============================
   PHBI
   ============================ */
function nextPHBI(){
  const n=new Date();let near=null,nd=Infinity;
  for(const p of S.phbi){const d=new Date(p.date+'T00:00:00');const df=d-n;if(df>=0&&df<nd){nd=df;near={n:p.name,d};}}
  return near;
}
function updPHBI(){
  const ph=nextPHBI(),c=document.getElementById('phbiCard');
  if(!ph){c.style.display='none';return;}
  c.style.display='block';
  document.getElementById('phbiName').textContent=ph.n;
  const d=Math.ceil((ph.d-new Date())/864e5);
  document.getElementById('phbiCountdown').innerHTML=d>0?'<b>'+d+'</b> hari lagi':d===0?'<b>Hari ini</b>':'<b>Baru saja</b>';
}

/* ============================
   RUNNING TEXT
   ============================ */
function updRT(){
  const el=document.getElementById('marqueeText');
  if(!S.runningText){el.parentElement.style.display='none';return;}
  el.parentElement.style.display='flex';
  el.textContent=S.runningText;
  el.style.setProperty('--dur',Math.max(25,S.runningText.length*.15)+'s');
}

/* ============================
   OVERLAYS
   ============================ */
function hideOv(){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('on'));}
function showOv(id){hideOv();document.getElementById(id).classList.add('on');}
function showNorm(){hideOv();document.getElementById('app').style.display='flex';}
function hideNorm(){document.getElementById('app').style.display='none';}

function trigAzan(k){
  azKey=k;hideNorm();showOv('ovAzan');
  document.getElementById('azanPrayerName').textContent=NM[k];
  document.getElementById('azanTime').textContent=pTimes[k];
  mode='azan';mEnd=Date.now()+S.azanDuration*1000;
}
function trigIqo(k){
  hideNorm();showOv('ovIqo');
  document.getElementById('iqomahPrayer').textContent=NM[k]+' — '+S.mosque.name;
  iqEnd=Date.now()+(S.iqomah[k]||3)*6e4;mode='iqomah';
}
function trigBlack(){hideNorm();showOv('ovBlack');mode='black';mEnd=Date.now()+S.display.blackScreenMinutes*6e4;}
function trigJum(){
  hideNorm();
  document.getElementById('jumatInfo').innerHTML=
    `<div class="jm-card"><div class="jm-card-lbl">Imam</div><div class="jm-card-val">${S.jumat.imam}</div></div>
     <div class="jm-card"><div class="jm-card-lbl">Khatib</div><div class="jm-card-val">${S.jumat.khatib}</div></div>
     <div class="jm-card"><div class="jm-card-lbl">Muadzin</div><div class="jm-card-val">${S.jumat.muadzin}</div></div>
     <div class="jm-card"><div class="jm-card-lbl">Bilal</div><div class="jm-card-val">${S.jumat.bilal}</div></div>`;
  showOv('ovJum');mode='jumat';
}
function chkCust(){
  if(!S.customMessages||!Array.isArray(S.customMessages))return false;
  const n=new Date();
  for(const m of S.customMessages){
    if(!m.active)continue;
    if(m.schedule&&m.scheduleStart&&m.scheduleEnd){
      try{if(n>=new Date(m.scheduleStart)&&n<=new Date(m.scheduleEnd)){hideNorm();document.getElementById('customTitle').textContent=m.title||'';document.getElementById('customBody').textContent=m.body||'';showOv('ovCust');mode='cust';return true;}}catch(e){}
    }
    if(m.manual){hideNorm();document.getElementById('customTitle').textContent=m.title||'';document.getElementById('customBody').textContent=m.body||'';showOv('ovCust');mode='cust';return true;}
  }
  return false;
}

/* ============================
   MODE CHECK
   ============================ */
function chkMode(){
  if(chkCust())return;
  const n=new Date(),ts=n.toDateString();
  if(dateStr!==ts){trig.clear();dateStr=ts;}
  const ns=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
  const isJ=n.getDay()===5;

  if(mode==='azan'){if(Date.now()>=mEnd){AZ.includes(azKey)?trigIqo(azKey):showNorm();}else return;}
  if(mode==='iqomah'){document.getElementById('iqomahCount').textContent=fmtCd(Math.max(0,Math.ceil((iqEnd-Date.now())/1000)));if(Date.now()>=iqEnd){S.display.showBlackScreen?trigBlack():showNorm();}else return;}
  if(mode==='black'){if(Date.now()>=mEnd)showNorm();else return;}
  if(mode==='jum'){const ds=t2m(pTimes.dzuhur)*60;if(ns>=ds-30&&!trig.has('j_a')){trig.add('j_a');trigAzan('dzuhur');return;}return;}
  if(mode!=='normal')return;

  if(isJ&&!trig.has('j_w')){const ds=t2m(pTimes.dzuhur)*60;if(ns>=ds-S.display.jumatWelcomeMinutes*60){trig.add('j_w');trigJum();return;}}
  if(S.display.autoAzan){for(const k of AZ){if(trig.has(k))continue;const p=t2m(pTimes[k])*60;if(ns>=p&&ns<p+30){trig.add(k);trigAzan(k);return;}}}
}

/* ============================
   TICK
   ============================ */
function tick(){updClk();updCd();chkMode();if(mode==='normal'){renderPL();updPHBI();}}

/* ============================
   SPREADSHEET SYNC
   ============================ */
function fetchSS(){
  if(!S.spreadsheetUrl||!S.spreadsheetUrl.trim())return;
  fetch(S.spreadsheetUrl,{mode:'cors'})
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{if(d&&typeof d==='object'){S={...DEF,...d};if(!Array.isArray(S.phbi))S.phbi=[];if(!Array.isArray(S.customMessages))S.customMessages=[];svS(S);pTimes=calcPT(new Date());initSlide();updRT();}})
    .catch(()=>{});
}

/* ============================
   INIT
   ============================ */
(function init(){
  ldS();
  pTimes=calcPT(new Date());
  setInterval(()=>{pTimes=calcPT(new Date());},6e4);
  updClk();renderPL();updCd();updPHBI();initSlide();updRT();
  setTimeout(showLT,2500);
  showNorm();
  setInterval(tick,1000);
  setInterval(fetchSS,3e4);
  fetchSS();
})();
</script>
