<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Digital TV</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg-deep:#040b18; --bg-primary:#081428; --bg-card:#0c1e3e;
  --bg-card2:#102a52; --blue:#1a3f78; --blue-mid:#2563b0;
  --blue-light:#3d85d4; --blue-glow:rgba(37,99,176,.35);
  --gold:#c9a84c; --gold-light:#e0c872; --gold-dim:rgba(201,168,76,.15);
  --text:#e4eaf4; --text-light:#8fa4c8; --text-muted:#4d6a90;
  --danger:#e05555; --success:#38b060; --border:#153060;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg-deep);color:var(--text);overflow:hidden;height:100vh;width:100vw}
.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;position:relative}

/* ====== HEADER ====== */
.header{display:flex;align-items:center;justify-content:space-between;padding:1vh 2vw;
  background:linear-gradient(135deg,var(--bg-primary),var(--bg-card));border-bottom:1px solid var(--border);position:relative;z-index:10}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mosque-info{display:flex;align-items:center;gap:1.2vw}
.mosque-icon{width:5.5vh;height:5.5vh;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8vh;color:var(--bg-deep)}
.mosque-name{font-size:2.4vh;font-weight:700;color:var(--gold);letter-spacing:.05em}
.mosque-addr{font-size:1.2vh;color:var(--text-light);font-weight:400}
.clock-area{text-align:right}
.clock-time{font-size:4.5vh;font-weight:800;color:var(--text);letter-spacing:.08em;line-height:1}
.clock-date{font-size:1.4vh;color:var(--text-light);margin-top:.3vh}
.clock-hijri{font-size:1.3vh;color:var(--gold);margin-top:.1vh}

/* ====== MAIN CONTENT ====== */
.content{display:grid;grid-template-columns:32% 1fr;gap:1.2vw;padding:1.2vh 2vw;overflow:hidden;min-height:0}

/* Prayer Panel */
.prayer-panel{display:flex;flex-direction:column;gap:1vh}
.prayer-title{font-size:1.6vh;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;text-align:center;padding:.8vh 0;border-bottom:1px solid var(--border)}
.method-badge{font-size:1vh;font-weight:500;color:var(--blue-light);text-transform:uppercase;letter-spacing:.1em;text-align:center;padding:.3vh 0;background:rgba(37,99,176,.1);border-radius:.5vh;margin-bottom:.5vh}
.prayer-list{display:flex;flex-direction:column;gap:.6vh;flex:1}
.prayer-item{display:grid;grid-template-columns:auto 1fr auto;padding:.9vh 1.2vw;border-radius:.8vh;background:var(--bg-card);border:1px solid var(--border);transition:all .4s ease;align-items:center}
.prayer-item.active{background:linear-gradient(135deg,var(--bg-card2),var(--blue));border-color:var(--gold);box-shadow:0 0 2vh var(--blue-glow),0 0 4vh var(--gold-dim)}
.prayer-item.active .prayer-name{color:var(--gold)}
.prayer-item.active .prayer-time{color:var(--gold-light);font-weight:700}
.prayer-item.active .prayer-icon{color:var(--gold)}
.prayer-icon{font-size:2vh;color:var(--blue-light);width:3.5vh;text-align:center}
.prayer-name{font-size:1.5vh;font-weight:600;color:var(--text);padding:0 .8vw}
.prayer-time-col{text-align:right}
.prayer-time{font-size:1.7vh;font-weight:600;color:var(--text-light);font-variant-numeric:tabular-nums}
.prayer-iqamah{font-size:1.1vh;color:var(--text-muted);font-weight:400}
.prayer-badge{font-size:.9vh;background:var(--gold);color:var(--bg-deep);padding:.15vh .6vh;border-radius:.3vh;font-weight:600;margin-left:.5vw;display:none}
.prayer-item.active .prayer-badge{display:inline}

/* Holiday Countdown */
.holiday-section{margin-top:auto;background:var(--bg-card);border-radius:.8vh;padding:1vh 1vw;border:1px solid var(--border)}
.holiday-title{font-size:1.1vh;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5vh}
.holiday-item{display:flex;justify-content:space-between;align-items:center;padding:.4vh 0;font-size:1.2vh}
.holiday-name{color:var(--text-light)}
.holiday-countdown{color:var(--gold);font-weight:600}

/* Right Panel */
.right-panel{display:flex;flex-direction:column;gap:1vh;min-height:0}
.slideshow{flex:1;border-radius:1vh;overflow:hidden;position:relative;background:var(--bg-card);border:1px solid var(--border);min-height:0}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover}
.slide-caption{position:absolute;bottom:0;left:0;right:0;padding:1.5vh 1.5vw;background:linear-gradient(transparent,rgba(4,11,24,.9));font-size:1.5vh;color:var(--text-light)}

/* Low Third */
.low-third-container{height:7.5vh;position:relative;overflow:hidden;border-radius:.8vh;border:1px solid var(--border);background:linear-gradient(135deg,var(--bg-card),var(--bg-card2))}
.low-third{position:absolute;bottom:0;left:0;right:0;padding:1vh 1.5vw;display:flex;align-items:center;gap:1.5vw;opacity:0;transform:translateY(100%);transition:all .6s ease}
.low-third.active{opacity:1;transform:translateY(0)}
.lt-accent{width:.5vh;height:4vh;background:var(--gold);border-radius:.3vh;flex-shrink:0}
.lt-icon{font-size:2.2vh;color:var(--gold);width:3.5vh;text-align:center;flex-shrink:0}
.lt-content{flex:1;min-width:0}
.lt-title{font-size:1.1vh;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em}
.lt-text{font-size:1.3vh;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ====== FOOTER ====== */
.footer{display:flex;align-items:center;padding:0 2vw;height:5.5vh;background:linear-gradient(135deg,var(--bg-primary),var(--bg-card));border-top:1px solid var(--border);position:relative;gap:2vw}
.footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.running-text{flex:1;overflow:hidden;position:relative;height:100%;display:flex;align-items:center}
.running-text-content{white-space:nowrap;font-size:1.4vh;color:var(--text-light);animation:marquee var(--marquee-dur,30s) linear infinite}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.footer-countdown{display:flex;align-items:center;gap:.8vw;flex-shrink:0;background:var(--bg-card);padding:.6vh 1.2vw;border-radius:.6vh;border:1px solid var(--border)}
.fc-label{font-size:1.1vh;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.fc-time{font-size:2vh;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}

/* ====== OVERLAY FULLSCREEN ====== */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s ease}
.overlay.show{opacity:1;pointer-events:auto}
.overlay-azan{background:radial-gradient(ellipse at center,rgba(12,30,62,.97),rgba(4,11,24,.99))}
.overlay-azan .ov-icon{font-size:12vh;color:var(--gold);margin-bottom:2vh;animation:pulse-glow 2s ease-in-out infinite}
.overlay-azan .ov-title{font-size:3.5vh;font-weight:300;color:var(--text-light);text-transform:uppercase;letter-spacing:.2em;margin-bottom:1vh}
.overlay-azan .ov-prayer{font-size:7vh;font-weight:800;color:var(--gold);margin-bottom:1vh}
.overlay-azan .ov-time-big{font-size:9vh;font-weight:900;color:var(--text);margin-bottom:2vh;font-variant-numeric:tabular-nums}
.overlay-azan .ov-arabic{font-family:'Amiri',serif;font-size:5vh;color:var(--gold-light);margin-bottom:2vh;direction:rtl}
.overlay-azan .ov-custom{font-size:2vh;color:var(--text-light);max-width:60vw;text-align:center;line-height:1.6}
.overlay-azan .ov-countdown-ring{margin-top:3vh}
.countdown-circle{width:18vh;height:18vh;border-radius:50%;border:.6vh solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.countdown-circle svg{position:absolute;inset:-.3vh;transform:rotate(-90deg)}
.countdown-circle circle{fill:none;stroke-width:.5vh;stroke:var(--gold);stroke-dasharray:565;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.cd-number{font-size:4.5vh;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
.cd-label{font-size:1.3vh;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}

@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 1vh rgba(201,168,76,.3))}50%{filter:drop-shadow(0 0 3vh rgba(201,168,76,.7))}}

/* Start Overlay */
.start-overlay{position:fixed;inset:0;z-index:2000;background:var(--bg-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .5s}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-btn{width:14vh;height:14vh;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:5vh;color:var(--bg-deep);cursor:pointer;transition:transform .3s;box-shadow:0 0 4vh var(--gold-dim)}
.start-btn:hover{transform:scale(1.1)}
.start-text{font-size:2vh;color:var(--text-light);margin-top:2vh}

/* Friday Mode Overlay */
.friday-overlay{background:radial-gradient(ellipse at center,rgba(12,30,62,.98),rgba(4,11,24,.99))}
.friday-info{display:grid;grid-template-columns:1fr 1fr;gap:2vw 4vw;margin-top:3vh;text-align:left}
.friday-info-item{display:flex;align-items:center;gap:1.5vw;padding:1.5vh 2vw;background:rgba(12,30,62,.6);border-radius:.8vh;border:1px solid var(--border)}
.friday-info-item i{color:var(--gold);font-size:2.5vh;width:4vh;text-align:center}
.friday-info-item div .fi-label{font-size:1.1vh;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.friday-info-item div .fi-value{font-size:2vh;font-weight:600;color:var(--text)}

/* Responsive */
@media(max-width:900px){
  .content{grid-template-columns:38% 1fr}
  .prayer-name{font-size:1.3vh}.prayer-time{font-size:1.5vh}
}
@media(max-aspect-ratio:4/3){
  .content{grid-template-columns:40% 1fr}
}
</style>
</head>
<body>

<!-- Start Overlay (diperlukan untuk inisialisasi audio) -->
<div class="start-overlay" id="startOverlay" onclick="startApp()">
  <div class="start-btn"><i class="fas fa-play"></i></div>
  <div class="start-text">Klik untuk memulai</div>
</div>

<!-- Main App -->
<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="mosque-info">
      <div class="mosque-icon"><i class="fas fa-mosque"></i></div>
      <div>
        <div class="mosque-name" id="mosqueName">Masjid Al-Ikhlas</div>
        <div class="mosque-addr" id="mosqueAddr">Curup, Rejang Lebong</div>
      </div>
    </div>
    <div class="clock-area">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">-</div>
      <div class="clock-hijri" id="clockHijri">-</div>
    </div>
  </header>

  <!-- Content -->
  <main class="content">
    <!-- Left: Prayer Schedule -->
    <aside class="prayer-panel">
      <div class="prayer-title"><i class="fas fa-clock" style="margin-right:.5em"></i>Jadwal Sholat</div>
      <div class="method-badge" id="methodBadge">Metode: Kemenag RI</div>
      <div class="prayer-list" id="prayerList"></div>
      <div class="holiday-section" id="holidaySection">
        <div class="holiday-title"><i class="fas fa-star-and-crescent" style="margin-right:.5em"></i>Hari Besar Islam</div>
        <div id="holidayList"></div>
      </div>
    </aside>

    <!-- Right: Slideshow + Low Third -->
    <div class="right-panel">
      <div class="slideshow" id="slideshow"></div>
      <div class="low-third-container" id="lowThirdContainer"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="running-text">
      <div class="running-text-content" id="runningText">Memuat...</div>
    </div>
    <div class="footer-countdown">
      <div class="fc-label" id="fcLabel">Berikutnya</div>
      <div class="fc-time" id="fcTime">--:--</div>
    </div>
  </footer>
</div>

<!-- Overlay: Azan -->
<div class="overlay overlay-azan" id="overlayAzan">
  <div class="ov-icon"><i class="fas fa-mosque"></i></div>
  <div class="ov-title" id="ovAzanTitle">Waktu Azan</div>
  <div class="ov-prayer" id="ovAzanPrayer">Subuh</div>
  <div class="ov-time-big" id="ovAzanTime">04:30</div>
  <div class="ov-arabic" id="ovAzanArabic">اَللهُ اَكْبَرُ</div>
  <div class="ov-custom" id="ovAzanCustom"></div>
</div>

<!-- Overlay: Iqamah Countdown -->
<div class="overlay overlay-azan" id="overlayIqamah">
  <div class="ov-title" id="ovIqamahTitle">Waktu Iqamah</div>
  <div class="ov-prayer" id="ovIqamahPrayer">Subuh</div>
  <div class="ov-countdown-ring">
    <div class="countdown-circle">
      <svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" id="iqamahRing"/></svg>
      <div class="cd-number" id="iqamahCdNum">00:00</div>
      <div class="cd-label">Iqamah</div>
    </div>
  </div>
  <div class="ov-arabic" id="ovIqamahArabic" style="margin-top:2vh"></div>
  <div class="ov-custom" id="ovIqamahCustom"></div>
</div>

<!-- Overlay: Prayer in Progress -->
<div class="overlay overlay-azan" id="overlayPrayer">
  <div class="ov-icon"><i class="fas fa-hands-praying"></i></div>
  <div class="ov-title" id="ovPrayerTitle">Shalat Berlangsung</div>
  <div class="ov-prayer" id="ovPrayerName">Subuh</div>
  <div class="ov-custom" id="ovPrayerCustom"></div>
</div>

<!-- Overlay: Jumat -->
<div class="overlay overlay-azan friday-overlay" id="overlayJumat">
  <div class="ov-icon"><i class="fas fa-mosque"></i></div>
  <div class="ov-title">Shalat Jumat</div>
  <div class="ov-prayer" id="ovJumatTime">12:30</div>
  <div class="ov-arabic" style="font-size:3vh;margin-bottom:1vh">اَللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ</div>
  <div class="ov-custom" id="ovJumatCustom"></div>
  <div class="friday-info" id="fridayInfo"></div>
</div>

<!-- Audio -->
<audio id="murottalPlayer" preload="none"></audio>

<script>
// ============================
// KONFIGURASI
// ============================
const SCRIPT_URL = 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA';

const PRAYERS = [
  {key:'Fajr',name:'Subuh',icon:'fa-cloud-moon'},
  {key:'Sunrise',name:'Syuruq',icon:'fa-sun'},
  {key:'Dhuhr',name:'Dzuhur',icon:'fa-sun'},
  {key:'Asr',name:'Ashar',icon:'fa-cloud-sun'},
  {key:'Maghrib',name:'Maghrib',icon:'fa-mountain-sun'},
  {key:'Isha',name:'Isya',icon:'fa-moon'}
];

const METHOD_MAP = {20:'Kemenag RI',3:'Muhammadiyah/MWL',2:'PrayerTimes.org/ISNA',1:'Univ. Islamic Sciences'};

// ============================
// STATE GLOBAL
// ============================
let cfg = {}, prayerAdjust=[], iqamahCfg=[], slides=[], lowThirds=[],
    runningTexts=[], murottalCfg=[], azanTextCfg={}, holidays=[],
    customCountdown=[], version=0;
let prayerTimes={}, iqamahTimes={};
let currentSlide=0, currentLT=0, nextPrayer=null;
let audioCtx=null, murottalPlayer=null;
let overlayState='none'; // none, azan, iqamah, prayer, jumat
let iqamahCountdownInterval=null, prayerEndTimeout=null;
let triggeredAzanToday={}, triggeredIqamahToday={};
let lastDataFetch=0;

// ============================
// INISIALISASI
// ============================
function startApp(){
  document.getElementById('startOverlay').classList.add('hidden');
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  murottalPlayer = document.getElementById('murottalPlayer');
  initApp();
}

async function initApp(){
  await loadAllData();
  await fetchPrayerTimes();
  renderAll();
  startClock();
  startSlideshow();
  startLowThird();
  setInterval(mainLoop, 1000);
  setInterval(autoRefreshCheck, 5000);
}

// ============================
// LOAD DATA DARI APPS SCRIPT
// ============================
async function loadAllData(){
  try{
    const res = await fetch(SCRIPT_URL+'?action=getAll');
    const json = await res.json();
    if(json.success){
      const d = json.data;
      cfg = d.config || {};
      prayerAdjust = d.prayerAdjust || [];
      iqamahCfg = d.iqamahTimes || [];
      slides = (d.slides||[]).filter(s=>s.active===true||s.active==='TRUE');
      lowThirds = (d.lowThird||[]).filter(l=>l.active===true||l.active==='TRUE');
      runningTexts = (d.runningText||[]).filter(r=>r.active===true||r.active==='TRUE');
      murottalCfg = d.murottal || [];
      azanTextCfg = d.azanText || {};
      holidays = d.islamicHolidays || [];
      customCountdown = d.customCountdown || [];
      version = d.version || 0;
      lastDataFetch = Date.now();
    }
  }catch(e){console.error('Load data error:',e)}
}

async function autoRefreshCheck(){
  try{
    const res = await fetch(SCRIPT_URL+'?action=getVersion');
    const json = await res.json();
    if(json.success && json.data.version !== version){
      console.log('Data berubah, refresh...');
      await loadAllData();
      await fetchPrayerTimes();
      renderAll();
    }
  }catch(e){}
}

// ============================
// FETCH JADWAL SHOLAT (ALADHAN API)
// ============================
async function fetchPrayerTimes(){
  const lat = parseFloat(cfg.latitude)||-3.4604;
  const lng = parseFloat(cfg.longitude)||102.8617;
  const method = parseInt(cfg.calcMethod)||20;
  const ts = Math.floor(Date.now()/1000);
  const url = `https://api.aladhan.com/v1/timings/${ts}?latitude=${lat}&longitude=${lng}&method=${method}&school=0`;

  try{
    const res = await fetch(url);
    const json = await res.json();
    if(json.code===200){
      const t = json.data.timings;
      const h = json.data.date.hijri;
      PRAYERS.forEach(p=>{
        let time = t[p.key];
        if(!time) return;
        // Bersihkan (kadang ada offset seperti "04:30 (+03)")
        time = time.split(' ')[0];
        const adj = prayerAdjust.find(a=>a.prayer===p.key);
        if(adj && parseInt(adj.adjustMinutes)){
          time = addMinutesToTime(time, parseInt(adj.adjustMinutes));
        }
        prayerTimes[p.key] = time;
      });
      // Hitung iqamah
      PRAYERS.forEach(p=>{
        if(p.key==='Sunrise'){iqamahTimes[p.key]=null;return;}
        const iq = iqamahCfg.find(i=>i.prayer===p.key);
        if(iq && (iq.enabled===true||iq.enabled==='TRUE') && prayerTimes[p.key]){
          iqamahTimes[p.key] = addMinutesToTime(prayerTimes[p.key], parseInt(iq.minutesAfterAzan)||0);
        }
      });
      // Simpan hijri
      if(h){
        cfg._hijriDate = `${h.day} ${h.month.en} ${h.year} H`;
      }
      // Cek ganti hari → reset trigger
      const today = new Date().toDateString();
      if(cfg._lastDate !== today){
        triggeredAzanToday={};triggeredIqamahToday={};
        cfg._lastDate=today;
      }
    }
  }catch(e){console.error('Prayer API error:',e)}
}

function addMinutesToTime(timeStr, mins){
  const [h,m] = timeStr.split(':').map(Number);
  const d = new Date(2000,0,1,h,m+mins);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ============================
// RENDER SEMUA UI
// ============================
function renderAll(){
  renderHeader();
  renderPrayerList();
  renderSlideshow();
  renderLowThirds();
  renderRunningText();
  renderHolidays();
  updateNextPrayer();
}

function renderHeader(){
  document.getElementById('mosqueName').textContent = cfg.mosqueName||'Masjid Al-Ikhlas';
  document.getElementById('mosqueAddr').textContent = cfg.mosqueAddress||'Curup, Rejang Lebong';
  const method = parseInt(cfg.calcMethod)||20;
  document.getElementById('methodBadge').textContent = 'Metode: '+(METHOD_MAP[method]||'Kemenag RI');
}

function renderPrayerList(){
  const list = document.getElementById('prayerList');
  list.innerHTML = '';
  PRAYERS.forEach(p=>{
    const time = prayerTimes[p.key]||'--:--';
    const iq = iqamahTimes[p.key];
    const item = document.createElement('div');
    item.className = 'prayer-item';
    item.id = 'prayer-'+p.key;
    item.innerHTML = `
      <div class="prayer-icon"><i class="fas ${p.icon}"></i></div>
      <div class="prayer-name">${p.name}</div>
      <div class="prayer-time-col">
        <span class="prayer-time">${time}</span>
        ${iq?`<span class="prayer-iqamah">Iqamah: ${iq}</span>`:''}
        <span class="prayer-badge">Berikutnya</span>
      </div>
    `;
    list.appendChild(item);
  });
  highlightNextPrayer();
}

function highlightNextPrayer(){
  document.querySelectorAll('.prayer-item').forEach(el=>el.classList.remove('active'));
  if(nextPrayer){
    const el = document.getElementById('prayer-'+nextPrayer.key);
    if(el) el.classList.add('active');
  }
}

function renderSlideshow(){
  const container = document.getElementById('slideshow');
  container.innerHTML = '';
  if(slides.length===0){
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:2vh"><i class="fas fa-image" style="margin-right:1vw;font-size:4vh"></i>Tidak ada slide</div>';
    return;
  }
  slides.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className = 'slide'+(i===0?' active':'');
    div.innerHTML = `<img src="${s.url}" alt="${s.caption||''}" onerror="this.src='https://picsum.photos/seed/fallback${i}/800/450'">${s.caption?`<div class="slide-caption">${s.caption}</div>`:''}`;
    container.appendChild(div);
  });
}

function renderLowThirds(){
  const container = document.getElementById('lowThirdContainer');
  container.innerHTML = '';
  if(lowThirds.length===0){
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:1.5vh">Tidak ada info</div>';

  }

function renderRunningText(){
  const el = document.getElementById('runningText');
  const texts = runningTexts.map(r=>r.text).join('  \u2726  ');
  el.textContent = texts||'Selamat datang di Masjid';
  const dur = Math.max(20, texts.length*0.3);
  el.style.setProperty('--marquee-dur', dur+'s');
}

function renderHolidays(){
  const container = document.getElementById('holidayList');
  container.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = holidays.filter(h=>{
    const d = new Date(h.targetDate); return d>=today;
  }).sort((a,b)=>new Date(a.targetDate)-new Date(b.targetDate)).slice(0,3);

  if(upcoming.length===0){
    container.innerHTML = '<div style="font-size:1.1vh;color:var(--text-muted)">Tidak ada hari besar mendatang</div>';
    return;
  }
  upcoming.forEach(h=>{
    const d = new Date(h.targetDate);
    const diff = Math.ceil((d-today)/(1000*60*60*24));
    const div = document.createElement('div');
    div.className = 'holiday-item';
    div.innerHTML = `<span class="holiday-name">${h.name}</span><span class="holiday-countdown">${diff} hari lagi</span>`;
    container.appendChild(div);
  });
}

// ============================
// JAM
// ============================
function startClock(){
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${h}:${m}:${s}`;

  const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  document.getElementById('clockDate').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  // Hijriah
  if(cfg._hijriDate){
    document.getElementById('clockHijri').textContent = cfg._hijriDate;
  } else {
    try{
      const hijri = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura',{day:'numeric',month:'long',year:'numeric'}).format(now);
      document.getElementById('clockHijri').textContent = hijri;
    }catch(e){}
  }
}

// ============================
// SLIDESHOW
// ============================
let slideInterval;
function startSlideshow(){
  if(slideInterval) clearInterval(slideInterval);
  slideInterval = setInterval(()=>{
    if(slides.length<=1) return;
    const allSlides = document.querySelectorAll('.slide');
    allSlides[currentSlide]?.classList.remove('active');
    currentSlide = (currentSlide+1)%slides.length;
    allSlides[currentSlide]?.classList.add('active');
  }, 8000);
}

// ============================
// LOW THIRD ROTASI
// ============================
let ltInterval;
function startLowThird(){
  if(ltInterval) clearInterval(ltInterval);
  ltInterval = setInterval(()=>{
    if(lowThirds.length<=1) return;
    const allLT = document.querySelectorAll('.low-third');
    allLT[currentLT]?.classList.remove('active');
    currentLT = (currentLT+1)%lowThirds.length;
    allLT[currentLT]?.classList.add('active');

// ============================
// LOOP UTAMA (setiap detik)
// ============================
function mainLoop(){
  if(overlayState!=='none') return; // Jangan cek jika overlay aktif
  const now = new Date();
  const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  updateNextPrayer();
  updateFooterCountdown(now);

  // Cek trigger azan
  PRAYERS.forEach(p=>{
    if(p.key==='Sunrise') return;
    if(prayerTimes[p.key]===currentTime && !triggeredAzanToday[p.key]){
      triggeredAzanToday[p.key]=true;
      showAzanOverlay(p);
    }
  });

  // Cek Jumat
  if(now.getDay()===5 && cfg.fridayMode==='true'){
    const jumatTime = cfg.jumatTime||azanTextCfg.jumatTime||'12:30';
    if(currentTime===jumatTime && !triggeredAzanToday['Jumat']){
      triggeredAzanToday['Jumat']=true;
      showJumatOverlay();
    }
  }

  // Cek custom countdown
  customCountdown.forEach(cd=>{
    if(cd.active===true||cd.active==='TRUE'){
      if(cd.targetTime===currentTime && !(cd.triggered===true||cd.triggered==='TRUE')){
        triggerCustomCountdown(cd);
      }
    }
  });
}

function updateNextPrayer(){
  const now = new Date();
  const nowMin = now.getHours()*60+now.getMinutes();
  nextPrayer = null;

  for(const p of PRAYERS){
    if(p.key==='Sunrise') continue;
    const t = prayerTimes[p.key];
    if(!t) continue;
    const [h,m] = t.split(':').map(Number);
    const pMin = h*60+m;
    if(pMin>nowMin){
      nextPrayer = p;
      break;
    }
  }
  if(!nextPrayer){
    // Besok (Subuh)
    nextPrayer = PRAYERS[0];
  }
  highlightNextPrayer();
}

function updateFooterCountdown(now){
  if(!nextPrayer || !prayerTimes[nextPrayer.key]){
    document.getElementById('fcLabel').textContent = 'Berikutnya';
    document.getElementById('fcTime').textContent = '--:--';
    return;
  }
  const [h,m] = prayerTimes[nextPrayer.key].split(':').map(Number);
  const target = new Date(now); target.setHours(h,m,0,0);
  if(target<=now) target.setDate(target.getDate()+1);
  const diff = target-now;
  const dm = Math.floor(diff/60000);
  const dh = Math.floor(dm/60);
  const dmin = dm%60;
  document.getElementById('fcLabel').textContent = nextPrayer.name;
  document.getElementById('fcTime').textContent = `${String(dh).padStart(2,'0')}:${String(dmin).padStart(2,'0')}`;
}

// ============================
// OVERLAY AZAN
// ============================
function showAzanOverlay(prayer){
  overlayState='azan';
  playBeep(800, 400, 3, 800);

  document.getElementById('ovAzanTitle').textContent = azanTextCfg.azanTitle||'Waktu Azan';
  document.getElementById('ovAzanPrayer').textContent = prayer.name;
  document.getElementById('ovAzanTime').textContent = prayerTimes[prayer.key];
  document.getElementById('ovAzanArabic').textContent = azanTextCfg.azanArabic||'اَللهُ اَكْبَرُ اَللهُ اَكْبَرُ';
  document.getElementById('ovAzanCustom').textContent = azanTextCfg.azanCustom||'';
  document.getElementById('overlayAzan').classList.add('show');

  // Mainkan murottal
  playMurottal(prayer.key);

  // Durasi azan overlay
  const azanDur = parseInt(cfg.azanDurationSec)||120;
  setTimeout(()=>{
    document.getElementById('overlayAzan').classList.remove('show');
    // Mulai countdown iqamah
    startIqamahCountdown(prayer);
  }, azanDur*1000);
}

// ============================
// OVERLAY IQAMAH COUNTDOWN
// ============================
function startIqamahCountdown(prayer){
  overlayState='iqamah';
  const iqTime = iqamahTimes[prayer.key];
  if(!iqTime){
    overlayState='none';
    return;
  }

  document.getElementById('ovIqamahTitle').textContent = azanTextCfg.iqamahTitle||'Waktu Iqamah';
  document.getElementById('ovIqamahPrayer').textContent = prayer.name;
  document.getElementById('ovIqamahArabic').textContent = azanTextCfg.iqamahArabic||'حَيَّ عَلَى الصَّلَاةِ';
  document.getElementById('ovIqamahCustom').textContent = azanTextCfg.iqamahCustom||'';
  document.getElementById('overlayIqamah').classList.add('show');

  const [ih,im] = iqTime.split(':').map(Number);
  const targetMs = new Date(); targetMs.setHours(ih,im,0,0);
  const totalSec = Math.max(0, Math.floor((targetMs-Date.now())/1000));

  let remaining = totalSec;
  const circumference = 2*Math.PI*90; // r=90 dari SVG

  function tickIqamah(){
    if(remaining<=0){
      clearInterval(iqamahCountdownInterval);
      document.getElementById('overlayIqamah').classList.remove('show');
      showPrayerOverlay(prayer);
      return;
    }
    const rm = Math.floor(remaining/60);
    const rs = remaining%60;
    document.getElementById('iqamahCdNum').textContent = `${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
    const progress = 1-(remaining/totalSec);
    document.getElementById('iqamahRing').style.strokeDashoffset = circumference*(1-progress);
    remaining--;
  }
  tickIqamah();
  iqamahCountdownInterval = setInterval(tickIqamah, 1000);

  // Beep saat iqamah mulai
  playBeep(1000, 300, 2, 600);
}

// ============================
// OVERLAY SHALAT BERLANGSUNG
// ============================
function showPrayerOverlay(prayer){
  overlayState='prayer';
  stopMurottal();
  playBeep(600, 500, 1, 0);

  document.getElementById('ovPrayerTitle').textContent = azanTextCfg.prayerTitle||'Shalat Berlangsung';
  document.getElementById('ovPrayerName').textContent = prayer.name;
  document.getElementById('ovPrayerCustom').textContent = azanTextCfg.prayerCustom||'';
  document.getElementById('overlayPrayer').classList.add('show');

  const dur = parseInt(cfg.prayerDurationMin)||15;
  prayerEndTimeout = setTimeout(()=>{
    document.getElementById('overlayPrayer').classList.remove('show');
    overlayState='none';
  }, dur*60*1000);
}

// ============================
// OVERLAY JUMAT
// ============================

  playBeep(800, 400, 5, 600);

// ============================
// CUSTOM COUNTDOWN TRIGGER
// ============================
function triggerCustomCountdown(cd){
  overlayState='iqamah';
  playBeep(900, 300, 3, 500);

  document.getElementById('ovIqamahTitle').textContent = cd.title||'Countdown';
  document.getElementById('ovIqamahPrayer').textContent = '';
  document.getElementById('ovIqamahArabic').textContent = '';
  document.getElementById('ovIqamahCustom').textContent = '';
  document.getElementById('overlayIqamah').classList.add('show');

  const totalSec = (parseInt(cd.durationMin)||5)*60;
  let remaining = totalSec;
  const circumference = 2*Math.PI*90;

  function tick(){
    if(remaining<=0){
      clearInterval(iqamahCountdownInterval);
      document.getElementById('overlayIqamah').classList.remove('show');
      overlayState='none';
      playBeep(1000,500,1,0);
      return;
    }
    const rm=Math.floor(remaining/60),rs=remaining%60;
    document.getElementById('iqamahCdNum').textContent=`${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
    const progress=1-(remaining/totalSec);
    document.getElementById('iqamahRing').style.strokeDashoffset=circumference*(1-progress);
    remaining--;
  }
  tick();
  iqamahCountdownInterval=setInterval(tick,1000);
}

// ============================
// AUDIO: BEEP
// ============================
function playBeep(freq, dur, count, gap){
  if(!audioCtx) return;
  for(let i=0;i<count;i++){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.value=freq;osc.type='sine';
    gain.gain.setValueAtTime(0,audioCtx.currentTime+i*(dur+gap)/1000);
    gain.gain.linearRampToValueAtTime(0.3,audioCtx.currentTime+i*(dur+gap)/1000+0.02);
    gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+i*(dur+gap)/1000+dur/1000);
    osc.start(audioCtx.currentTime+i*(dur+gap)/1000);
    osc.stop(audioCtx.currentTime+i*(dur+gap)/1000+dur/1000);
  }
}

// ============================
// AUDIO: MUROTTAL
// ============================
function playMurottal(prayerKey){
  const m = murottalCfg.find(m=>m.prayer===prayerKey);
  if(!m || !(m.enabled===true||m.enabled==='TRUE') || !m.url) return;
  murottalPlayer.src = m.url;
  murottalPlayer.play().catch(e=>console.log('Murottal autoplay blocked:',e));
  const dur = (parseInt(m.durationSec)||180)*1000;
  setTimeout(()=>stopMurottal(), dur);
}

function stopMurottal(){
  if(murottalPlayer){
    murottalPlayer.pause();
    murottalPlayer.currentTime=0;
  }
}
