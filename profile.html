<script src="config.js"></script>
<script>
"use strict";

const YT_API = "https://www.googleapis.com/youtube/v3";

function fmt(n) {
  n = parseInt(n) || 0;
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(".0","") + " Jt";
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(".0","") + " Rb";
  return n.toLocaleString("id");
}
function ago(iso) {
  if (!iso) return "";
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return "Baru saja";
  if (s < 3600) return `${Math.floor(s/60)} mnt lalu`;
  if (s < 86400) return `${Math.floor(s/3600)} jam lalu`;
  if (s < 2592000) return `${Math.floor(s/86400)} hari lalu`;
  return `${Math.floor(s/31536000)} thn lalu`;
}
function thumb(t, keys=["maxres","standard","high","medium","default"]) {
  for (const k of keys) if (t?.[k]?.url) return t[k].url;
  return "";
}
function parseDur(d) {
  if (!d) return "";
  const m = d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return "";
  const h=+m[1]||0, min=+m[2]||0, s=+m[3]||0;
  return h ? `${h}:${String(min).padStart(2,"0")}:${String(s).padStart(2,"0")}`
           : `${min}:${String(s).padStart(2,"0")}`;
}
async function yt(ep, params={}) {
  const url = new URL(`${YT_API}/${ep}`);
  Object.entries({ key: CONFIG.API_KEY, ...params })
    .forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || "API error");
  return data;
}

// Navbar scroll effect
window.addEventListener("scroll", () => {
  document.querySelector(".navbar")?.classList.toggle("scrolled", scrollY > 20);
}, { passive: true });

async function loadProfile() {
  try {
    // Load channel info
    const data = await yt("channels", {
      part: "snippet,statistics,brandingSettings",
      id: CONFIG.CHANNEL_ID,
    });
    const ch = data.items?.[0];
    if (!ch) return;

    // Avatar
    const avatarUrl = thumb(ch.snippet.thumbnails);
    if (avatarUrl) document.getElementById("profAvatar").src = avatarUrl;

    // Nama & tagline
    document.getElementById("profName").textContent = ch.snippet.title;
    const tagline = ch.brandingSettings?.channel?.description ||
                    ch.snippet.description?.split("\n")[0] || "";
    if (tagline) document.getElementById("profTagline").textContent = tagline;

    // Stats
    const s = ch.statistics;
    document.getElementById("profSubs").textContent = `${fmt(s.subscriberCount)} subscriber`;
    document.getElementById("profVids").textContent = `${fmt(s.videoCount)} video`;
    document.getElementById("profViews").textContent = `${fmt(s.viewCount)} tayangan`;

    // YouTube link
    const ytUrl = `https://www.youtube.com/channel/${CONFIG.CHANNEL_ID}`;
    document.getElementById("profYtBtn").href = ytUrl;
    document.getElementById("lnkYt").href = ytUrl;

    // About / deskripsi panjang
    const fullDesc = ch.snippet.description || "";
    if (fullDesc.trim()) {
      document.getElementById("profAbout").textContent = fullDesc;
      document.getElementById("profileAboutCard").style.display = "";
    }

    // Tampilkan konten, sembunyikan skeleton
    document.getElementById("profileSkeleton").style.display = "none";
    document.getElementById("profileContent").style.display = "";

    // Load video terbaru
    loadLatestVideos();

  } catch(e) {
    console.error("Profile load error:", e);
    document.getElementById("profileSkeleton").innerHTML =
      `<p style="color:#94a3b8;font-size:0.85rem">Gagal memuat data channel.</p>`;
  }
}

async function loadLatestVideos() {
  const list = document.getElementById("latestVideoMini");
  try {
    let videoItems = [];

    if (CONFIG.PLAYLIST_ID && !CONFIG.PLAYLIST_ID.includes("YOUR_")) {
      const pl = await yt("playlistItems", {
        part: "snippet", playlistId: CONFIG.PLAYLIST_ID, maxResults: 5,
      });
      const ids = pl.items.map(i => i.snippet.resourceId.videoId).join(",");
      if (ids) {
        const det = await yt("videos", { part: "snippet,statistics,contentDetails", id: ids });
        videoItems = det.items;
      }
    }

    if (!videoItems.length) {
      const srch = await yt("search", {
        part: "snippet", channelId: CONFIG.CHANNEL_ID,
        type: "video", maxResults: 5, order: "date",
      });
      const ids = srch.items.map(i => i.id.videoId).join(",");
      if (ids) {
        const det = await yt("videos", { part: "snippet,statistics,contentDetails", id: ids });
        videoItems = det.items;
      }
    }

    list.innerHTML = "";
    videoItems.forEach(v => {
      const img = thumb(v.snippet.thumbnails);
      const dur = parseDur(v.contentDetails?.duration);
      const item = document.createElement("div");
      item.className = "related-item";
      item.style.cursor = "pointer";
      item.innerHTML = `
        <div class="related-thumb">
          <img src="${img}" alt="${v.snippet.title}" loading="lazy" />
          ${dur ? `<span class="related-dur">${dur}</span>` : ""}
        </div>
        <div class="related-info">
          <div class="related-title">${v.snippet.title}</div>
          <div class="related-meta">${fmt(v.statistics?.viewCount)} views · ${ago(v.snippet.publishedAt)}</div>
        </div>`;
      item.addEventListener("click", () => { window.location.href = `video.html?v=${v.id}`; });
      list.appendChild(item);
    });
  } catch(e) {
    list.innerHTML = `<p style="color:#5a5878;font-size:0.8rem">Gagal memuat video.</p>`;
  }
}

// Read more toggle
let readMoreExpanded = false;
document.getElementById("btnReadMore").addEventListener("click", () => {
  readMoreExpanded = !readMoreExpanded;
  const el = document.getElementById("profAbout");
  el.classList.toggle("expanded", readMoreExpanded);
  document.getElementById("btnReadMore").innerHTML = readMoreExpanded
    ? 'Lebih sedikit <i class="fa-solid fa-chevron-up"></i>'
    : 'Baca selengkapnya <i class="fa-solid fa-chevron-down"></i>';
});

document.addEventListener("DOMContentLoaded", loadProfile);
</script>
